          <div className="field-group">
            <div className="field-row">
              <label>PAN</label>
              <input type="text" placeholder="ABCDE1234F" maxLength={10}
                value={credentials.pan}
                onChange={e => handleCred('pan', e.target.value.toUpperCase())}
                style={{textTransform:'uppercase'}}/>
            </div>
            <div className="field-row">
              <label>Date of birth</label>
              <input type="date" value={credentials.dob} onChange={e => handleCred('dob', e.target.value)}/>
            </div>
          </div>
          <div className="field-row">
            <label>Full name (as on accounts)</label>
            <input type="text" placeholder="As it appears on statements"
              value={credentials.fullName}
              onChange={e => handleCred('fullName', e.target.value)}/>
          </div>

          <div className="actions">
            <button className="btn-primary" disabled={!canProceed} style={{opacity: canProceed ? 1 : 0.4}} onClick={onNext}>
              Load accounts →
            </button>
            {!canProceed && <span style={{fontSize:12, color:'var(--text3)'}}>Enter PAN, DOB and name to continue</span>}
          </div>
        </div>
      );
    }

    // ─── AccountsScreen ───────────────────────────────────────────────────────
    function AccountsScreen({ taxYear, priorFbarFile, initialAccounts, setFinalAccounts, setFxRate, onNext, onBack }) {
      const priorYear = taxYear - 1;
      const [loading, setLoading] = useState(initialAccounts.length === 0);
      const [error, setError]   = useState(null);
      const [accts, setAccts]   = useState(initialAccounts);
      const [showAdd, setShowAdd] = useState(false);
      const [newRow, setNewRow] = useState({ name:'', type:'other', number:'' });

      // Sync to App state on every change so navigating back doesn't lose data
      useEffect(() => { setFinalAccounts(accts); }, [accts]);

      useEffect(() => {
        if (initialAccounts.length > 0) return; // already loaded, don't clobber
        async function load() {
          let rate = 83.97;
          try {
            const r = await fetch(`${WORKER_URL}/api/fx?year=${taxYear}`);
            if (r.ok) { const d = await r.json(); rate = d.rate; }
          } catch(_) {}
          setFxRate(rate);

          if (priorFbarFile) {
            try {
              const extracted = await extractXFAAccounts(priorFbarFile);
              if (extracted && extracted.length > 0) {
                setAccts(extracted.map((a, i) => ({
                  id: String(i + 1),
                  name: a.institution_name,
                  number: a.account_number || '????',
                  type: a.account_type || 'bank',
                  ownership: a.ownership || 'sole',
                  joint_owner: a.joint_owner || null,
                  currency: 'INR',
                  include: true,
                  source: 'fbar',
                  priorMax: a.max_value_usd || null,
                  priorYearEnd: a.year_end_value_usd || null,
                  newMax: null, newYearEnd: null,
                  matchFile: null, matchStatus: 'pending',
                })));
              } else {
                setError('No accounts extracted from PDF — add accounts manually below.');
              }
            } catch(e) {
              setError('Could not read FBAR: ' + e.message);
            }
          }
          setLoading(false);
        }
        load();
      }, []);

      function addAccount() {
        if (!newRow.name.trim()) return;
        const last4 = newRow.number.replace(/\D/g,'').slice(-4);
        setAccts(prev => [...prev, {
          id: String(Date.now()),
          name: newRow.name.trim(),
          number: last4 ? `****${last4}` : '????',
          type: newRow.type,
          ownership: 'sole', joint_owner: null, currency: 'INR',
          include: true, source: 'manual',
          priorMax: null, priorYearEnd: null,
          newMax: null, newYearEnd: null,
          matchFile: null, matchStatus: 'pending',
        }]);
        setNewRow({ name:'', type:'other', number:'' });
        setShowAdd(false);
      }

      function proceed() {
        setFinalAccounts(accts);
        onNext();
      }

      const included = accts.filter(a => a.include).length;

      if (loading) return (
        <div className="main" style={{display:'flex', alignItems:'center', gap:10, color:'var(--text2)', fontSize:14}}>
          <span className="spin-icon">↻</span> Reading {priorFbarFile ? priorFbarFile.name : 'FBAR'}…
        </div>
      );

      return (
        <div className="review-main">
          <button className="nav-back" onClick={onBack}>← Setup</button>
          <div className="top-row">
            <div>
              <div className="page-title">{priorYear} accounts — {taxYear} FBAR baseline</div>
              <div className="page-sub">Toggle off accounts you won't report in {taxYear}, delete closed accounts, or add new ones.</div>
            </div>
            <div className="stat-row">
              <div className="stat"><div className="stat-val">{included}</div><div className="stat-label">included</div></div>
              <div className="stat"><div className="stat-val" style={{color:'var(--text3)'}}>{accts.length - included}</div><div className="stat-label">excluded</div></div>
            </div>
          </div>

          {error && <div style={{padding:'10px 14px', background:'var(--amber-bg)', border:'0.5px solid var(--amber-border)', borderRadius:'var(--radius)', fontSize:13, color:'var(--amber-text)', marginBottom:16}}>{error}</div>}

          <div className="tbl-outer">
            <table>
              <thead>
                <tr>
                  <th>Institution</th>
                  <th>Account #</th>
                  <th>Type</th>
                  <th>Ownership</th>
                  <th style={{textAlign:'right'}}>Prior max (USD)</th>
                  <th style={{textAlign:'right'}}>Prior yr-end</th>
                  <th style={{textAlign:'center'}}>Include in {taxYear}</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {accts.map(a => (
                  <tr key={a.id} style={{opacity: a.include ? 1 : 0.45}}>
                    <td>
                      <div style={{fontWeight:500, fontSize:13}}>{a.name}</div>
                      {a.via && <div style={{fontSize:11, color:'var(--text3)'}}>via {a.via}</div>}
                    </td>
                    <td className="mono">{a.number}</td>
                    <td>{TYPE_LABELS[a.type] || a.type}</td>
                    <td style={{fontSize:11, color:'var(--text3)'}}>
                      {a.ownership === 'joint'
                        ? <span style={{color:'var(--amber-text)'}}>joint{a.joint_owner ? ` · ${a.joint_owner.slice(0,25)}` : ''}</span>
                        : a.ownership === 'sigauth' ? 'sig auth' : 'sole'}
                    </td>
                    <td style={{textAlign:'right', color:'var(--text2)'}}>{fmtUSD(a.priorMax)}</td>
                    <td style={{textAlign:'right', color:'var(--text2)'}}>{fmtUSD(a.priorYearEnd)}</td>
                    <td style={{textAlign:'center'}}>
                      <div className={`toggle${a.include ? ' on' : ''}`} style={{margin:'0 auto'}}
                        onClick={() => setAccts(prev => prev.map(x => x.id === a.id ? {...x, include: !x.include} : x))}>
                        <div className="toggle-thumb"/>
                      </div>
                    </td>
                    <td>
                      <button style={{background:'none', border:'none', cursor:'pointer', color:'var(--text3)', fontSize:14, padding:'2px 6px'}}
                        onClick={() => setAccts(prev => prev.filter(x => x.id !== a.id))}
                        title="Delete account">×</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showAdd ? (
            <div style={{marginTop:16, padding:'14px 16px', background:'var(--bg2)', border:'0.5px solid var(--border)', borderRadius:'var(--radius)'}}>
              <div style={{fontSize:13, fontWeight:500, marginBottom:10}}>Add account</div>
              <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:10, marginBottom:10}}>
                <div>
                  <label style={{fontSize:11, color:'var(--text3)', display:'block', marginBottom:4}}>Institution name</label>
                  <input type="text" placeholder="e.g. HDFC Bank, Zerodha, Clarus Capital I"
                    value={newRow.name} autoFocus
                    onChange={e => setNewRow(p => ({...p, name: e.target.value}))}
                    onKeyDown={e => e.key === 'Enter' && addAccount()}
                    style={{width:'100%', padding:'7px 10px', border:'0.5px solid var(--border2)', borderRadius:'var(--radius)', fontSize:13}}/>
                </div>
                <div>
                  <label style={{fontSize:11, color:'var(--text3)', display:'block', marginBottom:4}}>Type</label>
                  <select value={newRow.type} onChange={e => setNewRow(p => ({...p, type: e.target.value}))}
                    style={{width:'100%', padding:'7px 10px', border:'0.5px solid var(--border2)', borderRadius:'var(--radius)', fontSize:13, background:'var(--bg)'}}>
                    <option value="bank">Bank</option>
                    <option value="brokerage">Brokerage</option>
                    <option value="mf">Mutual Fund</option>
                    <option value="other">Other (AIF/PMS/FD)</option>
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11, color:'var(--text3)', display:'block', marginBottom:4}}>Acct / Folio # (optional)</label>
                  <input type="text" placeholder="last 4 digits" maxLength={20}
                    value={newRow.number} onChange={e => setNewRow(p => ({...p, number: e.target.value}))}
                    onKeyDown={e => e.key === 'Enter' && addAccount()}
                    style={{width:'100%', padding:'7px 10px', border:'0.5px solid var(--border2)', borderRadius:'var(--radius)', fontSize:13}}/>
                </div>
              </div>
              <div style={{display:'flex', gap:8}}>
                <button className="btn-primary" style={{fontSize:12}} onClick={addAccount}>Add</button>
                <button className="btn-ghost" style={{fontSize:12}} onClick={() => setShowAdd(false)}>Cancel</button>
              </div>
            </div>
          ) : (
            <button className="btn-ghost" style={{marginTop:14, fontSize:13}} onClick={() => setShowAdd(true)}>+ Add account</button>
          )}

          <div className="actions">
            <button className="btn-primary" disabled={included === 0} style={{opacity: included ? 1 : 0.4}} onClick={proceed}>
              Match statements → ({included} account{included !== 1 ? 's' : ''})
            </button>
          </div>
        </div>
      );
    }

    // ─── MatchScreen ──────────────────────────────────────────────────────────
    function MatchScreen({ taxYear, accounts, setAccounts, fxRate, onNext, onBack }) {
      const priorYear = taxYear - 1;
      const [stmtFiles, setStmtFiles] = useState([]);
      const [matching, setMatching]   = useState(false);
      const [matchDone, setMatchDone] = useState(false);
      const [matchLog, setMatchLog]   = useState([]);
      const [rows, setRows]           = useState(() =>
        accounts.filter(a => a.include).map(a => ({...a, matchStatus: 'pending', matchFile: null}))
      );
      const stmtRef = useRef();
      const runningRef = useRef(false);

      // Snapshot refs so async runMatch always sees latest state
      const stmtFilesRef = useRef(stmtFiles);
      const rowsSnapRef  = useRef(rows);
      useEffect(() => { stmtFilesRef.current = stmtFiles; }, [stmtFiles]);
      useEffect(() => { rowsSnapRef.current  = rows; },      [rows]);

      async function runMatch() {
        if (runningRef.current) return;
        runningRef.current = true;

        const files = stmtFilesRef.current;
        const currentRows = rowsSnapRef.current;
        const log = [];

        if (files.length === 0) {
          setMatchLog(['✗ No files — drop statement files above first.']);
          setMatchDone(true); runningRef.current = false; return;
        }
        if (currentRows.length === 0) {
          setMatchLog(['✗ No accounts — go back to Accounts and load or add accounts.']);
          setMatchDone(true); runningRef.current = false; return;
        }

        setMatching(true);
        setMatchDone(false);

        try {
          // ── Step 1: extract text from every file ──────────────────────────
          log.push(`Reading ${files.length} file(s)…`);
          setMatchLog([...log]);

          const fileTexts = [];
          for (const file of files) {
            try {
              const text = await extractTextFromFile(file);
              fileTexts.push({ file, text });
              log.push(`  ✓ ${file.name}  (${text.length.toLocaleString()} chars extracted)`);
            } catch(e) {
              log.push(`  ✗ ${file.name}: ${e.message}`);
            }
          }

          if (fileTexts.length === 0) {
            log.push('✗ Could not read any files.');
            setMatchLog([...log]); setMatching(false); setMatchDone(true);
            runningRef.current = false; return;
          }

          // ── Step 2: for each account, search across all files ─────────────
          // Summary files (CAMS CAS, portfolio XLS) are handled naturally:
          // each account searches for its own name in the file and extracts
          // the balance from that specific section only.
          log.push(`\nMatching ${currentRows.length} account(s) across ${fileTexts.length} file(s)…`);

          for (const row of currentRows) {
            log.push(`\n[${row.name}]`);

            // Collect ALL files that confidently match this account.
            // Threshold 0.5 + at least 2 word hits to avoid false positives from
            // common financial terms (e.g. "securities", "bank") appearing in unrelated docs.
            const MATCH_THRESHOLD = 0.5;
            const MATCH_MIN_HITS  = 2;
            const allMatches = [];
            let topScoringResult = null;
            let topScoringFile   = null;

            for (const { file, text } of fileTexts) {
              const result = findAccountInText(row.name, text);
              const score  = result?.score ?? 0;
              const hits   = result?._hits ?? 0;
              const ok     = score >= MATCH_THRESHOLD && hits >= MATCH_MIN_HITS;
              log.push(`  ${ok ? '✓' : '·'} ${file.name}  score ${score.toFixed(2)}  hits ${hits}`);
              if (ok) {
                allMatches.push({ result, file });
                if (score > (topScoringResult?.score ?? 0)) {
                  topScoringResult = result;
                  topScoringFile   = file;
                }
              }
            }

            if (allMatches.length > 0) {
              // Max peak balance across all matching files.
              // Never overwrite name/number — those come from the FBAR and are correct.
              const maxPeak    = Math.max(...allMatches.map(m => m.result.peakBalance));
              const maxYearEnd = Math.max(...allMatches.map(m => m.result.yearEndBalance));
              const sourceFiles = allMatches.map(m => m.file.name).join(', ');
              setRows(prev => prev.map(r => r.id === row.id ? {
                ...r,
                newMax:      Math.round(maxPeak    / fxRate),
                newYearEnd:  Math.round(maxYearEnd / fxRate),
                matchFile:   allMatches.length === 1 ? topScoringFile.name : `${allMatches.length} files`,
                matchStatus: 'matched',
              } : r));
              log.push(`  → matched across ${allMatches.length} file(s): ${sourceFiles}`);
              log.push(`     peak ₹${maxPeak.toLocaleString('en-IN')}  → ${fmtUSD(Math.round(maxPeak/fxRate))} max`);
            } else {
              setRows(prev => prev.map(r => r.id === row.id ? {...r, matchStatus: 'manual'} : r));
              log.push(`  → not found — enter manually`);
            }
          }

        } catch(e) {
          log.push(`\n✗ Unexpected error: ${e.message}`);
        }

        setMatchLog([...log]);
        setMatching(false);
        setMatchDone(true);
        runningRef.current = false;
      }

      function handleDrop(e) {
        e.preventDefault();
        addFiles(Array.from(e.dataTransfer.files));
      }

      function addFiles(newFiles) {
        const valid = newFiles.filter(f => /\.(pdf|xls|xlsx|csv)$/i.test(f.name));
        if (!valid.length) return;
        setStmtFiles(prev => {
          const names = new Set(prev.map(f => f.name));
          return [...prev, ...valid.filter(f => !names.has(f.name))];
        });
        setMatchDone(false); // reset so Start matching shows again
      }

      function updateRow(id, field, val) {
        const num = parseFloat(val.replace(/[^0-9.]/g,''));
        setRows(prev => prev.map(r => r.id === id
          ? {...r, [field]: isNaN(num) ? null : num,
              matchStatus: r.matchStatus === 'matched' ? 'matched' : 'manual'}
          : r));
      }

      function proceed() {
        setAccounts(rows);
        onNext();
      }

      const matched = rows.filter(r => r.matchStatus === 'matched').length;
      const manual  = rows.filter(r => r.matchStatus === 'manual').length;
      const pending = rows.filter(r => r.matchStatus === 'pending').length;

      return (
        <div className="review-main">
          <button className="nav-back" onClick={onBack}>← Accounts</button>
          <div className="top-row">
            <div>
              <div className="page-title">Match {taxYear} statements</div>
              <div className="page-sub">Drop statement files, then click Start matching. Edit any value directly in the table.</div>
            </div>
            <div className="stat-row">
              {matched > 0 && <div className="stat"><div className="stat-val" style={{color:'var(--green-text)'}}>{matched}</div><div className="stat-label">matched</div></div>}
              {manual > 0  && <div className="stat"><div className="stat-val" style={{color:'var(--amber-text)'}}>{manual}</div><div className="stat-label">manual</div></div>}
              {pending > 0 && <div className="stat"><div className="stat-val" style={{color:'var(--text3)'}}>{pending}</div><div className="stat-label">pending</div></div>}
            </div>
          </div>

          <div style={{display:'flex', gap:10, marginBottom:16, alignItems:'flex-start'}}>
            <div style={{flex:1, border:`0.5px dashed var(--border2)`, borderRadius:'var(--radius)', padding:'14px 18px',
                background:'var(--bg2)', cursor:'pointer'}}
              onDrop={handleDrop} onDragOver={e => e.preventDefault()}
              onClick={() => stmtRef.current.click()}>
              {stmtFiles.length > 0 ? (
                <div>
                  <span style={{fontSize:13, color:'var(--green-text)', fontWeight:500}}>✓ {stmtFiles.length} file{stmtFiles.length !== 1 ? 's' : ''}</span>
                  <span style={{fontSize:12, color:'var(--text3)', marginLeft:10}}>{stmtFiles.map(f=>f.name).join(', ').slice(0,100)}{stmtFiles.reduce((s,f)=>s+f.name.length,0)>100?'…':''}</span>
                  <span style={{fontSize:12, color:'var(--text3)', marginLeft:6}}>· click to add more</span>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:13, color:'var(--text2)', marginBottom:3}}>Drop statement files here, or click to browse</div>
                  <div style={{fontSize:12, color:'var(--text3)'}}>PDF · XLS · XLSX · CSV</div>
                </div>
              )}
            </div>
            {stmtFiles.length > 0 && !matching && (
              <button className="btn-primary" style={{whiteSpace:'nowrap', alignSelf:'center'}} onClick={runMatch}>
                {matchDone ? 'Re-match' : 'Start matching'}
              </button>
            )}
            {matching && <span style={{fontSize:13, color:'var(--blue-text)', alignSelf:'center'}}>
              <span className="spin-icon">↻</span> Matching…
            </span>}
          </div>
          <input ref={stmtRef} type="file" accept=".pdf,.xls,.xlsx,.csv" multiple style={{display:'none'}}
            onChange={e => addFiles(Array.from(e.target.files))}/>


          <div className="tbl-outer">
            <table>
              <thead>
                <tr>
                  <th rowSpan={2}>Institution</th>
                  <th rowSpan={2}>Acct #</th>
                  <th rowSpan={2}>Type</th>
                  <th colSpan={2} className="prior">{priorYear} prior</th>
                  <th className="new-grp">{taxYear} max (USD)</th>
                  <th rowSpan={2}>Source</th>
                </tr>
                <tr>
                  <th className="sub-prior">Max</th>
                  <th className="sub-prior-r">Yr-end</th>
                  <th className="sub-new">Highest balance</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(r => (
                  <tr key={r.id} className={r.matchStatus === 'matched' ? '' : r.matchStatus === 'manual' ? 'row-review' : ''}>
                    <td>
                      <div style={{fontWeight:500, fontSize:13}}>{r.name}</div>
                    </td>
                    <td className="mono">{r.number}</td>
                    <td style={{fontSize:12}}>{TYPE_LABELS[r.type] || r.type}</td>
                    <td className="muted pb">{fmtUSD(r.priorMax)}</td>
                    <td className="muted">{fmtUSD(r.priorYearEnd)}</td>
                    <td className="r nb">
                      <input className="edit-cell"
                        value={r.newMax != null ? String(Math.round(r.newMax)) : ''}
                        placeholder="—"
                        style={r.matchStatus==='matched' ? {color:'var(--green-text)', fontWeight:500} : {}}
                        onChange={e => updateRow(r.id, 'newMax', e.target.value)}/>
                    </td>
                    <td>
                      {r.matchFile
                        ? <span className="chip" title={r.matchFile}>{r.matchFile.slice(0,22)}{r.matchFile.length > 22 ? '…' : ''}</span>
                        : r.matchStatus === 'manual'
                        ? <span style={{fontSize:11, color:'var(--amber-text)'}}>manual</span>
                        : <span style={{color:'var(--text3)', fontSize:11}}>—</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {matchDone && (
            <div style={{marginTop:12, padding:'10px 14px', background:'var(--bg2)', border:'0.5px solid var(--border)', borderRadius:'var(--radius)'}}>
              <div style={{fontSize:11, fontWeight:500, color:'var(--text3)', marginBottom:6}}>Matching log</div>
              <pre style={{fontSize:11, color:'var(--text2)', lineHeight:1.7, whiteSpace:'pre-wrap', maxHeight:200, overflowY:'auto'}}>{matchLog.join('\n')}</pre>
            </div>
          )}

          <div className="actions">
            <button className="btn-primary" onClick={proceed}>Proceed to export →</button>
            <span className="fx-note">INR → USD · Dec 31 ₹{fxRate.toFixed(2)}/$1</span>
          </div>
        </div>
      );
    }

    // ─── ScanScreen ───────────────────────────────────────────────────────────
    function ScanScreen({ taxYear, geminiKey, gmailToken, setGmailToken, priorFbarFile, uploadedStatements, priorManualAccounts, setAccounts, setFxRate, onNext, onBack, cacheDir }) {
      const isGmail = geminiKey && gmailToken;
      const isLocal = geminiKey && uploadedStatements.length > 0;
      const isReal = isGmail || isLocal || (geminiKey && (priorFbarFile || priorManualAccounts.length > 0));
      const [items, setItems] = useState([]);
      const [error, setError] = useState(null);
      const [done, setDone] = useState(false);
      const [tokenExpired, setTokenExpired] = useState(false);
      const [newToken, setNewToken] = useState('');
      // Intermediate scan results — held here until user clicks Proceed
      const [scanData, setScanData] = useState(null); // { priorAccounts, scannedList, rate, fbarFailed }
      // Per-item skip state: Set of item IDs skipped in this session
      const [skippedIds, setSkippedIds] = useState(() => new Set());
      // Persisted skips: Set of item labels saved across sessions
      const [savedSkipLabels] = useState(() => new Set(JSON.parse(localStorage.getItem('fbar_skipped_labels') || '[]')));

      function setItemStatus(id, status, note) {
        setItems(prev => prev.map(it => it.id === id ? { ...it, status, note: note || it.note } : it));
      }

      function skipItem(id) {
        setSkippedIds(prev => new Set([...prev, id]));
        // Also save the label persistently
        setItems(prev => {
          const item = prev.find(it => it.id === id);
          if (item) {
            const updated = new Set(savedSkipLabels);
            updated.add(item.label);
            localStorage.setItem('fbar_skipped_labels', JSON.stringify([...updated]));
          }
          return prev;
        });
      }

      function unskipItem(id) {
        setSkippedIds(prev => { const s = new Set(prev); s.delete(id); return s; });
        setItems(prev => {
          const item = prev.find(it => it.id === id);
          if (item) {
            const updated = new Set(savedSkipLabels);
            updated.delete(item.label);
            localStorage.setItem('fbar_skipped_labels', JSON.stringify([...updated]));
          }
          return prev;
        });
      }

      function proceedToReview() {
        if (!scanData) return;
        const { priorAccounts, scannedList, rate, fbarFailed } = scanData;
        // Filter out skipped items and deduplicate across all sources
        const seen = new Set();
        const activeList = scannedList.filter(a => {
          if (skippedIds.has(a._queryId)) return false;
          const key = normInst(a.institution_name) + '|' + (a.account_number || '').replace(/\*/g,'').slice(-4);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
        let finalAccounts;
        if (activeList.length > 0) {
          finalAccounts = matchAccounts(priorAccounts, activeList, rate);
        } else if (priorAccounts.length > 0) {
          finalAccounts = priorAccounts.map((p, i) => ({
            id: String(i + 1), name: p.institution_name,
            number: p.account_number || '****????', type: p.account_type || 'bank',
            currency: p.currency || 'INR', priorMax: p.max_value_usd,
            priorYearEnd: p.year_end_value_usd, newMax: null, newYearEnd: null,
            status: 'missing', source: null
          }));
        } else {
          finalAccounts = [];
        }
        console.log('[tax-agent] finalAccounts:', finalAccounts);
        setAccounts(finalAccounts);
        onNext();
      }

      useEffect(() => {
        let cancelled = false;

        async function fetchFxRate() {
          let rate = 83.97;
          try {
            const r = await fetch(`${WORKER_URL}/api/fx?year=${taxYear}`);
            if (r.ok) { const d = await r.json(); rate = d.rate; }
          } catch(_) {}
          return rate;
        }

        async function parsePriorFbarStep() {
          // PDF takes priority — try XFA extraction (and Gemini fallback) first
          if (priorFbarFile) {
            setItemStatus('fbar', 'active');
            try {
              const accounts = await parsePriorFBAR(priorFbarFile, geminiKey);
              if (accounts.length > 0) {
                setItemStatus('fbar', 'done', `${accounts.length} accounts found`);
                return { accounts, failed: false };
              }
              // PDF parsed but 0 accounts — check console for XFA debug logs
              const hint = !geminiKey ? ' (no Gemini key for fallback)' : ' (check console for XFA debug)';
              setItemStatus('fbar', 'error', `0 accounts extracted from PDF${hint}`);
            } catch(e) {
              console.error('[tax-agent] parsePriorFBAR error:', e);
              setItemStatus('fbar', 'error', e.message || String(e));
            }
          }
          // Fall back to manually entered accounts
          if (priorManualAccounts.length > 0) {
            const accounts = priorManualAccounts.map(a => ({
              institution_name: a.institution_name,
              account_number: a.account_number,
              account_type: a.account_type,
              max_value_usd: parseFloat(a.max_value_usd) || 0,
              year_end_value_usd: parseFloat(a.year_end_value_usd) || 0,
              currency: 'INR',
            }));
            setItemStatus('fbar', 'done', `${accounts.length} accounts from manual entry`);
            return { accounts, failed: false };
          }
          return { accounts: [], failed: false };
        }

        async function runGmailScan(priorAccounts) {
          const queries = buildGmailQueries(priorAccounts, taxYear);
          const kindLabel = { scan: 'email scan', known: 'institution', fbar: 'prior FBAR', broad: 'subject match' };
          const gmailItems = queries.map((q, i) => ({
            id: `gq_${i}`, label: `${q.name}`, note2: kindLabel[q.kind] || '', status: 'pending', q: q.q,
            savedSkip: savedSkipLabels.has(q.name)
          }));
          // Auto-skip items saved from prior sessions
          const autoSkipped = new Set(gmailItems.filter(it => it.savedSkip).map(it => it.id));
          setSkippedIds(autoSkipped);

          // Insert gmail items before 'match'
          setItems(prev => {
            const withoutMatch = prev.filter(it => it.id !== 'match');
            const withStatus = gmailItems.map(it => ({
              ...it, status: it.savedSkip ? 'skip' : 'pending'
            }));
            return [...withoutMatch, ...withStatus, { id:'match', label:'Matching accounts', status:'pending' }];
          });

          // Load per-year message cache (parsed results keyed by msgId)
          let msgCache = loadMsgCache(taxYear);
          // Verify cache folder permission (non-blocking; null if not set or denied)
          const activeCacheDir = cacheDir ? await verifyDirHandle(cacheDir) : null;

          const scannedList = [];
          const seenMsgIds = new Set();  // dedup across queries (same msg can match multiple queries)
          const seenAccounts = new Set();
          // Track per-name totals so multiple queries for same institution merge in UI
          const nameFoundCount = {};

          // Helper: merge a parsed account into scannedList with dedup
          function mergeAccount(parsed, subject, from, queryId) {
            if (!parsed.institution_name) return false;
            const last4 = (parsed.account_number || '').replace(/\*/g,'').slice(-4);
            const normName = normInst(parsed.institution_name);
            const dedupeKey = normName + '|' + last4;
            if (seenAccounts.has(dedupeKey)) {
              const srcRank = { bank: 3, brokerage: 3, cas_mf: 2, cas_demat: 2, portfolio_manager: 1 };
              const existing = scannedList.find(s => normInst(s.institution_name) + '|' + (s.account_number||'').replace(/\*/g,'').slice(-4) === dedupeKey);
              if (existing) {
                const newRank = srcRank[parsed.source_type] || 1;
                const oldRank = srcRank[existing.source_type] || 1;
                if (newRank > oldRank) {
                  Object.assign(existing, { ...parsed, _source: `Gmail: ${subject.slice(0,50)}`, _from: from, _sources: [...(existing._sources||[existing._source]), `Gmail: ${subject.slice(0,50)}`] });
                } else {
                  existing._sources = [...(existing._sources||[existing._source]), `Gmail: ${subject.slice(0,50)}`];
                }
              }
              return false;
            }
            seenAccounts.add(dedupeKey);
            scannedList.push({ ...parsed, _source: `Gmail: ${subject.slice(0,50)}`, _from: from, _sources: [`Gmail: ${subject.slice(0,50)}`], _queryId: queryId });
            return true;
          }

          for (let i = 0; i < gmailItems.length; i++) {
            if (cancelled) return scannedList;
            const item = gmailItems[i];
            if (item.savedSkip) continue;
            // Show active only on first query for this name
            const isFirstForName = !Object.prototype.hasOwnProperty.call(nameFoundCount, item.label);
            if (isFirstForName) {
              nameFoundCount[item.label] = 0;
              setItemStatus(item.id, 'active');
            }
            let found = 0;
            try {
              const messages = await gmailSearch(gmailToken, item.q, 10);
              for (const msg of messages) {
                if (cancelled) return scannedList;
                if (seenMsgIds.has(msg.id)) continue;
                seenMsgIds.add(msg.id);

                // ── Cache hit: use stored parsed results, skip all API calls ──
                if (msgCache[msg.id]) {
                  const cached = msgCache[msg.id];
                  for (const att of (cached.atts || [])) {
                    for (const parsed of (att.parsedAccounts || [])) {
                      if (mergeAccount(parsed, cached.subject, cached.from, item.id)) found++;
                    }
                  }
                  continue;
                }

                // ── Cache miss: fetch from Gmail, parse, then cache ──
                const full = await gmailGetMessage(gmailToken, msg.id);
                const subject = gmailHeader(full.payload, 'Subject');
                const from = gmailHeader(full.payload, 'From');
                const attachments = extractAttachments(full.payload);
                const cacheEntry = { subject, from, atts: [] };

                for (const att of attachments) {
                  try {
                    const b64 = await gmailGetAttachment(gmailToken, msg.id, att.attId);

                    // Save attachment to local cache folder if available
                    if (activeCacheDir) {
                      // Sanitize: date prefix + sender slug + original filename
                      const datePrefix = new Date().toISOString().slice(0,10);
                      const senderSlug = from.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 30);
                      const cacheFilename = `${datePrefix}_${senderSlug}_${att.filename}`.slice(0, 200);
                      // Only write if not already on disk
                      if (!(await existsInCacheDir(activeCacheDir, cacheFilename))) {
                        await saveToCacheDir(activeCacheDir, cacheFilename, b64);
                      }
                    }

                    const parsedArr = await parseStatement({ data: b64, mimeType: att.mimeType, name: att.filename }, geminiKey);
                    cacheEntry.atts.push({ filename: att.filename, parsedAccounts: parsedArr });

                    for (const parsed of parsedArr) {
                      if (mergeAccount(parsed, subject, from, item.id)) found++;
                    }
                  } catch(_) {}
                }

                // Persist cache entry for next scan run
                msgCache = saveMsgCacheEntry(taxYear, msg.id, cacheEntry, msgCache);
              }
              nameFoundCount[item.label] = (nameFoundCount[item.label] || 0) + found;
              // Only update UI status on last query for this name, or if we found something
              const isLastForName = i === gmailItems.length - 1 || gmailItems[i+1].label !== item.label;
              if (isFirstForName || found > 0 || isLastForName) {
                const total = nameFoundCount[item.label];
                setItemStatus(item.id, 'done', total > 0 ? `${total} account${total > 1 ? 's' : ''} found` : 'no accounts');
              }
            } catch(e) {
              if (e instanceof GmailTokenExpiredError) throw e;
              setItemStatus(item.id, 'error', e.message.slice(0, 60));
            }
          }
          return scannedList;
        }

        async function runReal() {
          // FBAR-only mode: parse the prior FBAR and go straight to review.
          // Gmail scan and statement parsing are disabled until local folder
          // debug workflow is complete.
          setItems([
            { id:'fx', label:'Fetching INR → USD exchange rate', status:'pending' },
            ...(priorFbarFile ? [{ id:'fbar', label:`Parsing prior FBAR: ${priorFbarFile.name}`, status:'pending' }] : []),
          ]);

          setItemStatus('fx', 'active');
          const rate = await fetchFxRate();
          if (cancelled) return;
          setFxRate(rate);
          setItemStatus('fx', 'done', `₹${rate.toFixed(2)}/$1`);

          const { accounts: priorAccounts, failed: fbarFailed } = await parsePriorFbarStep();
          if (cancelled) return;

          setScanData({ priorAccounts, scannedList: [], rate, fbarFailed });
          setDone(true);
        }

        async function runDemo() {
          const demoItems = [
            { id:'s1', label:'Searching Gmail — Zerodha', status:'pending' },
            { id:'s2', label:'Searching Gmail — Groww', status:'pending' },
            { id:'s3', label:'Searching Gmail — HDFC', status:'pending' },
            { id:'s4', label:'Searching Gmail — ICICI & NSDL', status:'pending' },
            { id:'s5', label:'Fetching INR → USD exchange rate', status:'pending' },
            { id:'s6', label:'Matching accounts to prior FBAR', status:'pending' },
          ];
          setItems(demoItems);
          const delays = [700, 600, 800, 900, 500, 600];
          for (let i = 0; i < demoItems.length; i++) {
            if (cancelled) return;
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status:'active' } : it));
            await new Promise(r => setTimeout(r, delays[i]));
            if (cancelled) return;
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status:'done' } : it));
          }
          try {
            const r = await fetch(`${WORKER_URL}/api/fx?year=${taxYear}`);
            if (r.ok) { const d = await r.json(); setFxRate(d.rate); }
          } catch(_) {}
          const demoAccounts = DEMO_ACCOUNTS.map(a => ({ ...a }));
          setScanData({ priorAccounts: [], scannedList: demoAccounts.map(a => ({...a, _queryId: 's1'})), rate: 83.97, fbarFailed: false });
          setAccounts(demoAccounts);
          setDone(true);
        }

        if (isReal) runReal().catch(e => {
          if (e instanceof GmailTokenExpiredError) {
            sessionStorage.removeItem('gmail_token');
            setGmailToken(null);
            setTokenExpired(true);
            window.open('https://developers.google.com/oauthplayground/?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fgmail.readonly', '_blank');
          } else {
            setError(e.message);
          }
        });
        else runDemo().catch(e => setError(e.message));

        return () => { cancelled = true; };
      }, []);

      const statusIcon = (s) => {
        if (s === 'done') return '✓';
        if (s === 'error') return '✗';
        if (s === 'active') return <span className="spinner">◌</span>;
        return '·';
      };

      return (
        <div className="scan-main">
          <button className="nav-back" onClick={onBack}>← Setup</button>
          <div className="page-title">
            {isGmail ? 'Scanning Gmail' : isLocal ? 'Parsing files' : 'Demo scan'} — {taxYear}
          </div>
          <div className="page-sub">
            {isGmail
              ? `Searching Jan–Dec ${taxYear} (+ buffer to Feb ${taxYear+1}) for statements from all known institutions…`
              : isLocal
              ? `Parsing ${uploadedStatements.length} file${uploadedStatements.length > 1 ? 's' : ''} with Gemini…`
              : 'No Gmail or files connected — loading demo accounts.'}
          </div>
          {!isReal && (
            <div className="demo-banner" style={{marginBottom:12}}>
              {!geminiKey ? 'Add your Gemini API key and connect Gmail (or upload files) on the Setup screen to process real data.'
                         : 'Connect Gmail or upload statement files on the Setup screen.'}
            </div>
          )}
          {error && !tokenExpired && <div className="demo-banner" style={{marginBottom:12, borderColor:'var(--red-border)', background:'var(--red-bg)', color:'var(--red-text)'}}>Error: {error}</div>}
          {tokenExpired && (
            <div style={{marginBottom:16, padding:'14px 16px', background:'var(--amber-bg)', border:'0.5px solid var(--amber-border)', borderRadius:'var(--radius)'}}>
              <div style={{fontSize:13, fontWeight:500, color:'var(--amber-text)', marginBottom:10}}>Gmail token expired — paste a new one to re-scan</div>
              <div style={{fontSize:12, color:'var(--amber-text)', marginBottom:12, lineHeight:1.7}}>
                The OAuth Playground should have opened. If not: <a href="https://developers.google.com/oauthplayground/?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fgmail.readonly" target="_blank" rel="noreferrer" style={{color:'var(--blue)', fontWeight:500}}>open it here →</a><br/>
                Click <strong>Authorize APIs</strong> · sign in · <strong>Exchange authorization code for tokens</strong> · copy <strong>Access token</strong>
              </div>
              <div style={{display:'flex', gap:8}}>
                <input type="password" placeholder="ya29.a0…" value={newToken}
                  onChange={e => setNewToken(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && newToken.trim()) { setGmailToken(newToken.trim()); sessionStorage.setItem('gmail_token', newToken.trim()); setTokenExpired(false); setNewToken(''); onBack(); } }}
                  style={{flex:1, padding:'8px 10px', border:'0.5px solid var(--amber-border)', borderRadius:'var(--radius)', fontSize:13}}
                />
                <button className="btn-primary"
                  disabled={!newToken.trim()}
                  onClick={() => { const t = newToken.trim(); setGmailToken(t); sessionStorage.setItem('gmail_token', t); setTokenExpired(false); setNewToken(''); onBack(); }}>
                  Reconnect & Re-scan →
                </button>
              </div>
            </div>
          )}
          <div className="scan-list">
            {items.map(it => {
              const isSkipped = skippedIds.has(it.id);
              const canSkip = done && it.id !== 'fbar' && it.id !== 'fx';
              return (
                <div key={it.id} className={`scan-item${isSkipped ? '' : it.status === 'done' ? ' done' : it.status === 'active' ? ' active' : it.status === 'error' ? ' error' : ''}`}
                  style={isSkipped ? {opacity:0.4, textDecoration:'line-through'} : {}}>
                  <span className="scan-icon">{isSkipped ? '–' : statusIcon(it.status)}</span>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:'flex', alignItems:'center', gap:6}}>
                      <span>{it.label}</span>
                      {it.note2 && <span style={{fontSize:10, color:'var(--text3)', background:'var(--bg2)', border:'0.5px solid var(--border)', borderRadius:20, padding:'1px 6px'}}>{it.note2}</span>}
                      {it.status === 'skip' && <span style={{fontSize:10, color:'var(--text3)'}}>auto-skipped</span>}
                    </div>
                    {!isSkipped && it.note && <div style={{fontSize:11, opacity:0.7, marginTop:2}}>{it.note}</div>}
                  </div>
                  {it.q && (it.status === 'done' || it.status === 'error') && (
                    <a href={`https://mail.google.com/mail/u/0/#search/${encodeURIComponent(it.q)}`}
                      target="_blank" rel="noreferrer"
                      style={{fontSize:11, color:'var(--blue)', flexShrink:0, whiteSpace:'nowrap', textDecoration:'none'}}>
                      view emails →
                    </a>
                  )}
                  {canSkip && (
                    isSkipped
                      ? <button onClick={() => unskipItem(it.id)} style={{fontSize:11, color:'var(--blue)', background:'none', border:'none', cursor:'pointer', flexShrink:0}}>restore</button>
                      : <button onClick={() => skipItem(it.id)} style={{fontSize:11, color:'var(--text3)', background:'none', border:'none', cursor:'pointer', flexShrink:0, padding:'2px 6px'}}>skip ✕</button>
                  )}
                </div>
              );
            })}
          </div>
          {done && scanData && (
            <div style={{marginTop:20, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
              <button className="btn-primary" onClick={proceedToReview}>
                Proceed to review →
              </button>
              {skippedIds.size > 0 && (
                <span style={{fontSize:12, color:'var(--text3)'}}>{skippedIds.size} source{skippedIds.size > 1 ? 's' : ''} skipped · skips saved for future scans</span>
              )}
            </div>
          )}
        </div>
      );
    }

      const totalYearEnd = included.reduce((s, a) => s + (a.newYearEnd || 0), 0);
      const noValues = included.filter(a => !a.newMax && !a.newYearEnd).length;

      function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        let y = 18;

        // Header
        doc.setFontSize(14); doc.setFont(undefined,'bold');
        doc.text('FinCEN Form 114 — FBAR Reference Summary', pageW/2, y, {align:'center'});
        y += 7;
        doc.setFontSize(9); doc.setFont(undefined,'normal');
        doc.setTextColor(100);
        doc.text('This document is a reference summary for completing BSA e-filing. It is not the official FinCEN form.', pageW/2, y, {align:'center'});
        doc.setTextColor(0);
        y += 8;

        // Filer info
        doc.setFontSize(10); doc.setFont(undefined,'bold');
        doc.text('Part I — Filer Information', 14, y); y += 5;
        doc.setFont(undefined,'normal'); doc.setFontSize(9);
        const info = [
          ['Calendar year reported', String(taxYear)],
          ['Filer name', credentials.fullName || '—'],
          ['Exchange rate (Dec 31)', `₹${fxRate.toFixed(2)} per USD`],
          ['Total accounts reported', String(included.length)],
          ['Total maximum value (USD)', fmtUSD(totalMax)],
          ['Total year-end value (USD)', fmtUSD(totalYearEnd)],
        ];
        info.forEach(([label, val]) => {
          doc.setTextColor(100); doc.text(label, 14, y);
          doc.setTextColor(0); doc.text(val, 90, y);
          y += 5;
        });
        y += 4;

        // Accounts table
        doc.setFontSize(10); doc.setFont(undefined,'bold');
        doc.text('Part V — Foreign Financial Accounts', 14, y); y += 4;

        doc.autoTable({
          startY: y,
          head: [['#', 'Institution', 'Acct #', 'Type', 'Ownership', 'Max Value (USD)', 'Year-End (USD)', 'Source']],
          body: included.map((a, i) => [
            i + 1,
            a.name,
            a.number || '—',

          headStyles: { fillColor: [30,30,28], fontSize: 8 },

              if (data.cell.raw === 'MISSING') data.cell.styles.textColor = [180, 30, 30];
            }
          },
          margin: { left: 14, right: 14 },
        });

        y = doc.lastAutoTable.finalY + 8;
        doc.setFontSize(8); doc.setTextColor(120);
        doc.text('Generated by Tax Agent · jawadayaz.github.io/Tax-Agent · ' + new Date().toLocaleDateString(), 14, y);
        doc.setTextColor(0);

        doc.save(`FBAR_${taxYear}_reference.pdf`);

              </thead>
              <tbody>
                {included.map(a => (
                  <tr key={a.id}>
                    <td>{a.name}</td>
                    <td style={{fontFamily:'monospace', fontSize:11}}>{a.number || '—'}</td>
                    <td>{a.type}</td>
                    <td style={{textAlign:'right'}}>{a.newMax != null ? fmtUSD(a.newMax) : <span style={{color:'var(--red-text)'}}>missing</span>}</td>
                    <td style={{textAlign:'right'}}>{a.newYearEnd != null ? fmtUSD(a.newYearEnd) : <span style={{color:'var(--red-text)'}}>missing</span>}</td>
                    <td style={{fontSize:11, color:'var(--text3)'}}>{a.matchFile || a.source}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="actions" style={{marginBottom: 24}}>
            <button className="btn-primary" onClick={downloadPDF}>
              Download PDF summary
            </button>
            <button className="btn-secondary" onClick={downloadJSON}>
              Download JSON
            </button>
          </div>

          <div className="section-label" style={{marginBottom:10}}>BSA e-filing steps</div>
          <ul className="filing-steps">
            <li>Go to bsaefiling.fincen.treas.gov</li>
            <li>Log in with your FinCEN account (create one if needed)</li>
            <li>Select "File an FBAR" → FinCEN 114</li>
            <li>Enter each account from the data above</li>
            <li>Sign and submit before April 15 (auto-extended to Oct 15)</li>
          </ul>

          <div className="version-footer">{APP_VERSION}</div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [step, setStep] = useState('setup');
      const [taxYear, setTaxYear] = useState(new Date().getFullYear() - 1);
      const [credentials, setCredentials] = useState({ pan: '', dob: '', fullName: '' });
      const [priorFbarFile, setPriorFbarFile] = useState(null);
      const [accounts, setAccounts] = useState([]);
      const [fxRate, setFxRate] = useState(83.97);

      // Helpers: File ↔ sessionStorage (base64)
      async function fileToSession(file) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = e => res({ name: file.name, type: file.type, data: e.target.result.split(',')[1] });
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }
      function sessionToFile({ name, type, data }) {
        const bytes = Uint8Array.from(atob(data), c => c.charCodeAt(0));
        return new File([bytes], name, { type });
      }

      // Persist credentials and files across page refreshes
      useEffect(() => {
        const saved = localStorage.getItem('fbar_creds');
        if (saved) { try { setCredentials(JSON.parse(saved)); } catch(_) {} }
        try {
          const f = sessionStorage.getItem('prior_fbar_file');
          if (f) setPriorFbarFile(sessionToFile(JSON.parse(f)));
        } catch(_) {}
      }, []);
      useEffect(() => {
        if (credentials.pan || credentials.fullName) {
          localStorage.setItem('fbar_creds', JSON.stringify(credentials));
        }
      }, [credentials]);
      useEffect(() => {
        if (priorFbarFile) {
          fileToSession(priorFbarFile).then(d => sessionStorage.setItem('prior_fbar_file', JSON.stringify(d))).catch(() => {});
        } else {
          sessionStorage.removeItem('prior_fbar_file');
        }
      }, [priorFbarFile]);

      function navigate(target) {
        if (typeof target === 'string' && STEPS.includes(target)) { setStep(target); return; }
        const cur = STEPS.indexOf(step);
        const next = STEPS[cur + 1];
        if (next) setStep(next);
      }

      function goBack() {
        const cur = STEPS.indexOf(step);
        if (cur > 0) setStep(STEPS[cur - 1]);
      }

      const initials = credentials.fullName
        ? credentials.fullName.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase()
        : 'JA';

      return (
        <div className="shell">
          {window.location.protocol === 'file:' && (
            <div style={{background:'#7c2d12', color:'#fef3c7', padding:'10px 20px', fontSize:13, display:'flex', alignItems:'center', gap:10}}>
              <strong>⚠ Wrong origin:</strong> Open via <code style={{background:'rgba(0,0,0,0.3)', padding:'1px 6px', borderRadius:4}}>http://localhost:8080</code> — run <code style={{background:'rgba(0,0,0,0.3)', padding:'1px 6px', borderRadius:4}}>cd ~/Claude/projects/tax-agent && python3 -m http.server 8080</code> then reload.
            </div>
          )}
          <TopBar step={step} taxYear={taxYear} setTaxYear={setTaxYear} initials={initials} setStep={setStep}/>
          {step === 'setup' && (
            <SetupScreen
              credentials={credentials} setCredentials={setCredentials}
              priorFbarFile={priorFbarFile} setPriorFbarFile={setPriorFbarFile}
              taxYear={taxYear} onNext={navigate}
            />
          )}
          {step === 'accounts' && (
            <AccountsScreen
              taxYear={taxYear}
              priorFbarFile={priorFbarFile}
              initialAccounts={accounts}
              setFinalAccounts={setAccounts}
              setFxRate={setFxRate}
              onNext={navigate}
              onBack={goBack}
            />
          )}
          {step === 'match' && (
            <MatchScreen
              taxYear={taxYear}
              accounts={accounts}
              setAccounts={setAccounts}
              fxRate={fxRate}
              onNext={navigate}
              onBack={goBack}
            />
          )}
          {step === 'export' && (
            <ExportScreen
              accounts={accounts}
              taxYear={taxYear}
              fxRate={fxRate}
              credentials={credentials}
              onBack={goBack}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>

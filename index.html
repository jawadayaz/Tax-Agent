<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tax Agent — FBAR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
      --text: #1a1a18; --text2: #6b6b66; --text3: #9c9a92;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --blue: #378ADD; --blue-bg: #E6F1FB; --blue-text: #0C447C; --blue-border: #85B7EB;
      --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
      --amber-bg: #FAEEDA; --amber-text: #633806; --amber-border: #EF9F27;
      --red-bg: #FCEBEB; --red-text: #791F1F; --red-border: #F09595;
      --radius: 8px; --radius-lg: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background: var(--bg3); min-height: 100vh; padding: 24px; }
    .shell { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; max-width: 1100px; margin: 0 auto; }

    /* topbar */
    .topbar { padding: 11px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; }
    .logo span { color: var(--text3); font-weight: 400; }
    .steps { display: flex; align-items: center; margin: 0 auto; }
    .step { display: flex; align-items: center; gap: 6px; padding: 4px 12px; font-size: 12px; color: var(--text3); border-radius: 20px; white-space: nowrap; }
    .step.active { color: var(--text); background: var(--bg2); font-weight: 500; }
    .step.done { color: var(--text3); cursor: pointer; }
    .step.done:hover { color: var(--text2); background: var(--bg2); }
    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.35; flex-shrink: 0; }
    .step.active .step-dot { opacity: 1; background: var(--blue); }
    .step.done .step-dot { opacity: 0.25; }
    .step-div { width: 16px; height: 0.5px; background: var(--border); flex-shrink: 0; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue-bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--blue-text); flex-shrink: 0; }
    .badge { background: var(--blue-bg); color: var(--blue-text); border: 0.5px solid var(--blue-border); border-radius: var(--radius); padding: 3px 10px; font-size: 12px; white-space: nowrap; }

    /* forms */
    .main { padding: 28px 32px; max-width: 580px; }
    .page-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
    .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 22px 0; }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
    input[type=text], input[type=date], input[type=number] { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
    input[type=text]:focus, input[type=date]:focus, input[type=number]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
    .field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .field-row { margin-bottom: 16px; }
    .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .upload-zone { border: 0.5px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; background: var(--bg2); }
    .upload-zone.has-file { border-color: var(--green-border); background: var(--green-bg); }
    .upload-zone p { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
    .upload-zone small { font-size: 12px; color: var(--text3); }
    .upload-btns { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .upload-filename { font-size: 12px; color: var(--green-text); font-weight: 500; margin-top: 6px; }

    .privacy-note { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }

    .source-card { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .source-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
    .source-row:last-child { border-bottom: none; }
    .source-name { font-size: 13px; color: var(--text); }
    .source-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .toggle { width: 32px; height: 18px; background: var(--border2); border-radius: 9px; position: relative; cursor: pointer; flex-shrink: 0; border: none; padding: 0; }
    .toggle.on { background: var(--blue); }
    .toggle-thumb { width: 14px; height: 14px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .15s; }
    .toggle.on .toggle-thumb { left: 16px; }

    /* buttons */
    .btn-primary { background: var(--text); color: #fff; border: none; border-radius: var(--radius); padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: transparent; color: var(--text2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 9px 20px; font-size: 13px; cursor: pointer; }
    .btn-secondary:hover { background: var(--bg2); }
    .btn-ghost { background: transparent; color: var(--text3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-size: 12px; cursor: pointer; }
    .btn-ghost:hover { background: var(--bg2); }
    .actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; align-items: center; }

    /* pills */
    .pill { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; border: 0.5px solid; white-space: nowrap; }
    .pill-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .pill-amber { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
    .pill-red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
    .pill-blue { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
    .pill-gray { background: var(--bg2); color: var(--text3); border-color: var(--border); }
    .chip { font-size: 10px; color: var(--text3); background: var(--bg2); padding: 2px 6px; border-radius: 20px; border: 0.5px solid var(--border); }

    /* scan screen */
    .scan-main { padding: 32px; max-width: 520px; }
    .scan-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
    .scan-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); font-size: 13px; color: var(--text2); }
    .scan-item.done { color: var(--green-text); background: var(--green-bg); border-color: var(--green-border); }
    .scan-item.active { color: var(--text); background: var(--bg); border-color: var(--blue-border); }
    .scan-item.error { color: var(--red-text); background: var(--red-bg); border-color: var(--red-border); }
    .scan-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .scan-stats { display: flex; gap: 16px; padding: 12px 14px; background: var(--bg2); border-radius: var(--radius); font-size: 12px; color: var(--text2); margin-top: 16px; }
    .scan-stat-val { font-weight: 600; color: var(--text); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; display: inline-block; }

    /* review table */
    .review-main { padding: 20px 24px; }
    .top-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 16px; flex-wrap: wrap; }
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat { background: var(--bg2); border-radius: var(--radius); padding: 8px 14px; display: flex; align-items: baseline; gap: 6px; }
    .stat-val { font-size: 16px; font-weight: 500; }
    .stat-label { font-size: 11px; color: var(--text3); }
    .tbl-outer { border: 0.5px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    table { border-collapse: collapse; font-size: 12px; white-space: nowrap; width: 100%; }
    thead tr:first-child th { background: var(--bg2); }
    thead tr:last-child th { background: var(--bg2); border-bottom: 0.5px solid var(--border); }
    th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 500; color: var(--text2); }
    th.r { text-align: right; }
    th.prior { border-left: 0.5px solid var(--border); text-align: center; color: var(--text3); }
    th.new-grp { border-left: 0.5px solid var(--border); text-align: center; }
    th.sub-prior { border-left: 0.5px solid var(--border); text-align: right; color: var(--text3); }
    th.sub-prior-r { text-align: right; color: var(--text3); }
    th.sub-new { border-left: 0.5px solid var(--border); text-align: right; }
    th.sub-new-r { text-align: right; }
    td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
    td.r { text-align: right; font-variant-numeric: tabular-nums; }
    td.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text2); }
    td.muted { color: var(--text3); text-align: right; font-variant-numeric: tabular-nums; }
    td.pb { border-left: 0.5px solid var(--border); }
    td.nb { border-left: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: color-mix(in srgb, var(--bg2) 60%, transparent); }
    tr.row-review td { background: color-mix(in srgb, var(--amber-bg) 20%, transparent); }
    tr.row-new td { background: color-mix(in srgb, var(--blue-bg) 18%, transparent); }
    tr.row-missing td { background: color-mix(in srgb, var(--red-bg) 12%, transparent); }
    tr.row-closed td { opacity: 0.5; }
    tr.row-review:hover td, tr.row-new:hover td, tr.row-missing:hover td { filter: brightness(.97); }
    .edit-cell { color: var(--text); background: transparent; border: none; width: 82px; font-size: 12px; font-family: inherit; outline: none; text-align: right; font-variant-numeric: tabular-nums; }
    .edit-cell:focus { background: var(--blue-bg); border-radius: 3px; padding: 1px 4px; }
    .edit-cell::placeholder { color: var(--text3); font-size: 11px; }
    .type-change { display: flex; align-items: center; gap: 4px; }
    .type-old { text-decoration: line-through; color: var(--text3); font-size: 11px; }
    .fx-note { font-size: 11px; color: var(--text3); margin-left: auto; }

    /* chat */
    .chat-area { display: flex; flex-direction: column; height: 600px; }
    .chat-scroll { flex: 1; padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .msg-agent { max-width: 82%; }
    .msg-user { max-width: 70%; align-self: flex-end; }
    .agent-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
    .user-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; text-align: right; }
    .bubble-agent { background: var(--bg2); border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg); padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
    .bubble-user { background: var(--text); color: #fff; border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg); padding: 12px 14px; font-size: 13px; line-height: 1.6; }
    .summary-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-top: 10px; font-size: 12px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); gap: 12px; }
    .summary-row:last-child { border-bottom: none; }
    .s-name { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .s-muted { color: var(--text3); font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn-action { background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 14px; font-size: 12px; cursor: pointer; }
    .btn-action:hover { background: var(--bg2); }
    .btn-action.primary { background: var(--text); color: #fff; border-color: transparent; }
    .btn-action.primary:hover { opacity: 0.85; }
    .memory-note { font-size: 11px; color: var(--text3); background: var(--bg2); border-radius: var(--radius); padding: 4px 10px; margin-top: 8px; display: inline-block; border: 0.5px solid var(--border); }
    .chat-input-bar { padding: 12px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .chat-input-bar input { flex: 1; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
    .chat-input-bar input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
    .send-btn { background: var(--text); color: #fff; border: none; border-radius: var(--radius); padding: 8px 16px; font-size: 13px; cursor: pointer; }
    .send-btn:hover { opacity: 0.85; }
    .manual-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .manual-input-row input { width: 140px; padding: 6px 10px; border: 0.5px solid var(--blue-border); border-radius: var(--radius); font-size: 12px; outline: none; background: var(--blue-bg); }

    /* nav back */
    .nav-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 16px; }
    .nav-back:hover { color: var(--text2); }
    /* demo banner */
    .demo-banner { background: var(--amber-bg); border: 0.5px solid var(--amber-border); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--amber-text); margin-bottom: 16px; line-height: 1.5; }
    /* export */
    .export-main { padding: 28px 32px; max-width: 560px; }
    .export-summary { background: var(--bg2); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px; }
    .export-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .export-row:last-child { border-bottom: none; }
    .export-label { color: var(--text2); }
    .export-val { font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
    .warning-banner { background: var(--amber-bg); border: 0.5px solid var(--amber-border); border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--amber-text); margin-bottom: 16px; line-height: 1.5; }
    .filing-steps { font-size: 13px; color: var(--text2); line-height: 2; }
    .filing-steps li { list-style: none; padding-left: 20px; position: relative; }
    .filing-steps li::before { content: '→'; position: absolute; left: 0; color: var(--text3); }
    .version-footer { font-size: 11px; color: var(--text3); margin-top: 24px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script type="text/babel" data-presets="react">
    const APP_VERSION = 'v1.09';
    const WORKER_URL = 'https://tax-agent-worker.jawadayaz.workers.dev';
    const { useState, useEffect, useRef, useCallback } = React;

    const STEPS = ['setup', 'accounts', 'match', 'export'];
    const STEP_LABELS = ['Setup', 'Accounts', 'Match', 'Export'];

    const TYPE_LABELS = { bank: 'Bank', brokerage: 'Brokerage', mf: 'MF', other: 'Other' };

    const DEMO_ACCOUNTS = [
      { id:'1', name:'HDFC Bank savings', number:'****4821', type:'bank', currency:'INR', priorMax:12440, priorYearEnd:10900, newMax:13100, newYearEnd:11200, status:'matched', source:'email PDF' },
      { id:'2', name:'Zerodha trading', number:'****3301', type:'brokerage', currency:'INR', priorMax:44100, priorYearEnd:39200, newMax:47200, newYearEnd:38750, status:'matched', source:'email XLS' },
      { id:'3', name:'Groww MF', number:'****8812', type:'mf', currency:'INR', priorMax:18300, priorYearEnd:17100, newMax:21500, newYearEnd:19600, status:'matched', source:'email PDF' },
      { id:'4', name:'HDFC FD', number:'****2290', type:'bank', currency:'INR', priorMax:8100, priorYearEnd:8100, newMax:8100, newYearEnd:8100, status:'matched', source:'email PDF' },
      { id:'5', name:'SBI savings', number:'****7001', type:'bank', currency:'INR', priorMax:3200, priorYearEnd:3100, newMax:3400, newYearEnd:3200, status:'matched', source:'Drive PDF' },
      { id:'6', name:'NSDL CAS', number:'****5544', type:'brokerage', currency:'INR', priorMax:22000, priorYearEnd:20800, newMax:24100, newYearEnd:21400, status:'matched', source:'email PDF' },
      { id:'7', name:'Zerodha demat', number:'****9910', type:'brokerage', priorType:'mf', currency:'INR', priorMax:9500, priorYearEnd:9100, newMax:11200, newYearEnd:10800, status:'review', reviewReason:'type_change', source:'email XLS' },
      { id:'8', name:'Kotak Bank', number:'****6630', type:'bank', currency:'INR', priorMax:null, priorYearEnd:null, newMax:null, newYearEnd:4200, status:'new', source:'email PDF' },
      { id:'9', name:'ICICI FD', number:'****7744', type:'bank', currency:'INR', priorMax:6800, priorYearEnd:6800, newMax:null, newYearEnd:null, status:'missing', source:null },
    ];

    // ─── Gemini helpers ───────────────────────────────────────────────────────
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // fileInput: File object OR { data: base64string, mimeType: string, name?: string }
    async function callGemini(apiKey, promptText, fileInput) {
      const parts = [];
      if (fileInput) {
        let b64, mimeType;
        if (fileInput instanceof File) {
          b64 = await readFileAsBase64(fileInput);
          mimeType = fileInput.type ||
            (fileInput.name.endsWith('.pdf') ? 'application/pdf' :
             fileInput.name.endsWith('.xlsx') ? 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' :
             fileInput.name.endsWith('.xls') ? 'application/vnd.ms-excel' : 'application/octet-stream');
        } else {
          // base64url from Gmail API → standard base64
          b64 = (fileInput.data || '').replace(/-/g, '+').replace(/_/g, '/');
          mimeType = fileInput.mimeType || 'application/pdf';
        }
        parts.push({ inlineData: { mimeType, data: b64 } });
      }
      parts.push({ text: promptText });
      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts }],
            generationConfig: { responseMimeType: 'application/json' }
          })
        }
      );
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(`Gemini ${resp.status}: ${err.slice(0, 200)}`);
      }
      const data = await resp.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('Empty Gemini response');
      return JSON.parse(text);
    }

    // ─── Client-side statement parser (no API needed) ────────────────────────

    // Configure PDF.js worker
    (function() {
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    })();

    // Extract all text from a file (PDF, XLS/XLSX, CSV)
    async function extractTextFromFile(file) {
      const name = file.name.toLowerCase();

      if (name.endsWith('.csv')) {
        return file.text();
      }

      if (name.endsWith('.xls') || name.endsWith('.xlsx')) {
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        return wb.SheetNames
          .map(s => XLSX.utils.sheet_to_csv(wb.Sheets[s]))
          .join('\n');
      }

      // PDF via PDF.js
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        // Preserve rough line structure
        let lastY = null;
        for (const item of content.items) {
          if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) text += '\n';
          text += item.str + ' ';
          lastY = item.transform[5];
        }
        text += '\n';
      }
      // Fix PDF.js splitting of Indian-format numbers across text items.
      // e.g. "2,72,66,1 00" → "2,72,66,100"  or  "3,00,00 ,000" → "3,00,00,000"
      text = text
        // Case: last group split mid-way, e.g. "2,72,66,1 00" → "2,72,66,100"
        .replace(/(\d{1,3}(?:,\d{2})*,\d{1,2})[ \t]+(\d{1,2})(?!\d)/g, '$1$2')
        // Case: trailing 3-digit group separated by space, e.g. "3,00,00 000" → "3,00,00,000"
        .replace(/(\d{1,3}(?:,\d{2})*)[ \t]+(\d{3})(?!\d)/g, '$1,$2');
      return text;
    }

    // Parse INR amounts from text (handles Indian number format: 3,00,00,000)
    function extractAmounts(text) {
      const results = [];
      // Match Indian-format numbers with optional ₹/Rs prefix
      const re = /(?:₹|Rs\.?\s*)?(\d{1,3}(?:,\d{2})*(?:,\d{3})|\d{4,})(?:\.\d{1,2})?(?!\d)/g;
      for (const m of text.matchAll(re)) {
        const n = parseFloat(m[1].replace(/,/g, ''));
        if (n >= 1000) results.push(n); // ignore small amounts (fees, percentages etc.)
      }
      return results;
    }

    // Extract balance amounts near key financial labels
    function extractLabeledAmounts(text) {
      const lower = text.toLowerCase();
      const labeled = [];

      // Patterns: "label ... amount" within ~100 chars
      // NOTE: 'total commitment' intentionally excluded — it's invested capital, not current value.
      // NAV/current value keywords are listed first so they win when sorted by value.
      const keywords = [
        'pre-tax nav', 'post-tax nav', 'pre tax nav', 'post tax nav',
        'nav', 'net asset value',
        'current value', 'portfolio value', 'market value', 'total value',
        'closing balance', 'net balance', 'available balance', 'account balance',
        'total amount', 'year end value', 'yearend', 'balance as on', 'value as on',
      ];

      for (const kw of keywords) {
        let pos = 0;
        while ((pos = lower.indexOf(kw, pos)) !== -1) {
          const snippet = text.slice(pos, pos + 150);
          const re = /(\d{1,3}(?:,\d{2})*(?:,\d{3})|\d{5,})(?:\.\d{1,2})?/g;
          for (const m of snippet.matchAll(re)) {
            const n = parseFloat(m[1].replace(/,/g, ''));
            if (n >= 1000) labeled.push({ label: kw, value: n });
          }
          pos += kw.length;
        }
      }
      return labeled;
    }

    // Extract account/folio number
    function extractAccountNumber(text) {
      const patterns = [
        /folio\s*(?:no|number|#)?\s*:?\s*([\w\d]+)/i,
        /account\s*(?:no|number|#)?\s*:?\s*(\*?[\w\d*]+)/i,
        /client\s*(?:id|code)\s*:?\s*([\w\d]+)/i,
        /dp\s*(?:id|account)\s*:?\s*([\w\d]+)/i,
        /policy\s*(?:no|number)\s*:?\s*([\w\d]+)/i,
      ];
      for (const re of patterns) {
        const m = text.match(re);
        if (m) {
          const raw = m[1].replace(/\*/g, '');
          return `****${raw.slice(-4)}`;
        }
      }
      return null;
    }

    // Detect institution name from document text
    function detectInstitutionFromText(text, filename) {
      const lines = text.split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 3 && l.length < 100);

      // Skip lines that are purely numeric, dates, or addresses
      const skipRe = /^[\d\s,./%-]+$|^\d{1,2}[\s/-]\w+[\s/-]\d{4}|pg\s*\d|page\s*\d/i;

      // First ~15 lines — look for institution-like text (mixed alpha, starts with alpha)
      for (const line of lines.slice(0, 15)) {
        if (skipRe.test(line)) continue;
        if (/^[A-Z]/.test(line) && /[a-zA-Z]{3,}/.test(line)) {
          // Skip if it looks like a person's name / address (contains common address words)
          if (/\b(street|road|nagar|colony|park|flat|floor|plot|sector|phase|dist|pin|state)\b/i.test(line)) continue;
          return line;
        }
      }
      // Fallback: filename without extension
      return filename.replace(/[_-]/g, ' ').replace(/\.\w{2,5}$/, '').trim();
    }


    // Search for a specific account name within a document's text.
    // Uses a sliding window to find the region most relevant to that account,
    // then extracts balance data from that region only.
    // Works correctly for both single-account files and multi-account summaries.
    function findAccountInText(accountName, fullText) {
      const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
      const words = norm(accountName).split(' ').filter(w => w.length > 2);
      if (words.length === 0) return null;

      const lowerText = fullText.toLowerCase();
      const WIN = 700;   // chars per window
      const STEP = 50;

      let bestScore = 0;
      let bestPos   = 0;

      for (let i = 0; i <= Math.max(0, lowerText.length - WIN); i += STEP) {
        const chunk = lowerText.slice(i, i + WIN);
        const hits  = words.filter(w => chunk.includes(w)).length;
        const score = hits / words.length;
        if (score > bestScore) { bestScore = score; bestPos = i; }
      }

      const bestHits = Math.round(bestScore * words.length);
      if (bestScore < 0.3) return null;

      // Expand around best window for richer context
      const start  = Math.max(0, bestPos - 100);
      const end    = Math.min(fullText.length, bestPos + WIN + 400);
      const region = fullText.slice(start, end);

      // Institution name: first meaningful capitalised line in region that looks like a fund/bank name.
      // Skip metadata field lines (e.g. "Holding : Single 2nd Holder : NA NA"),
      // address words, and purely numeric/date lines.
      const skipRe = /^[\d\s,./%-]+$|pg\s*\d|page\s*\d/i;
      // Lines with " : " are typically label:value metadata rows, not institution names
      const metaRe = /\s:\s|\b(holding|holder|single|joint|nominee|pan|folio|type|mode|status|scheme|plan|option)\b/i;
      let institutionName = accountName; // default to account name if no clean line found
      for (const line of region.split('\n').map(l => l.trim()).filter(l => l.length > 3 && l.length < 80)) {
        if (skipRe.test(line)) continue;
        if (metaRe.test(line)) continue;
        if (/^[A-Z]/.test(line) && /[a-zA-Z]{3,}/.test(line) &&
            !/\b(street|road|nagar|park|flat|floor|plot|sector|dist|pin|mobile|email|tel)\b/i.test(line)) {
          institutionName = line;
          break;
        }
      }

      const accountNumber = extractAccountNumber(region);

      // Labeled amounts are most reliable; fall back to all amounts
      const labeledVals = extractLabeledAmounts(region).map(l => l.value).sort((a,b) => b-a);
      const allAmts     = extractAmounts(region).sort((a,b) => b-a);
      const peakBalance = labeledVals[0] || allAmts[0] || 0;

      // Look for Dec-31 balance in region
      let yearEndBalance = peakBalance;
      const dec31pos = region.search(/(?:31[\s/-]?dec|december[\s/-]?31|31\/12)/i);
      if (dec31pos !== -1) {
        const snip  = region.slice(dec31pos, dec31pos + 200);
        const found = extractAmounts(snip).sort((a,b) => b-a);
        if (found.length > 0) yearEndBalance = found[0];
      }

      return { score: bestScore, _hits: bestHits, institutionName, accountNumber, peakBalance, yearEndBalance };
    }

    // ─── Gmail scan queries ────────────────────────────────────────────────────
    // General-purpose financial statement detection queries.
    // No institution names hardcoded — works for any user.
    // Ordered roughly from highest-signal to broadest.
    // Sender-based queries use confirmed real-world senders discovered from live mailbox analysis.
    // Subject/filename-based queries catch any institution not in the sender list.
    // CAMS (camsonline.com) and KFintech (kfintech.com) act as transfer agents for dozens of AMFs
    // — a single from:camsonline.com query catches all of them for any user.
    const STATEMENT_SCAN_QUERIES = [
      // ── Tier 1: Confirmed sender domains — highest precision ──
      // Banks
      { name: 'HDFC Bank statements',       q: 'from:hdfcbank.net subject:statement' },          // hdfcbanksmartstatement@hdfcbank.net
      { name: 'HDFC Bank demat',            q: 'from:Emailstatements.demat@hdfcbank.net' },
      { name: 'ICICI Bank',                 q: 'from:icicibank.com subject:(statement OR account)' },
      { name: 'Kotak Bank',                 q: 'from:kotak.com subject:(statement OR account)' },
      { name: 'SBI',                        q: 'from:sbi.co.in subject:(statement OR account)' },
      { name: 'Axis Bank',                  q: 'from:axisbank.com subject:(statement OR account)' },
      { name: 'Yes Bank',                   q: 'from:yesbank.in OR from:casastmt@yesbank.in' },
      { name: 'IndusInd Bank',              q: 'from:indusind.com subject:(statement OR account)' },
      { name: 'RBL Bank',                   q: 'from:rblbank.com subject:(statement OR account)' },
      // Brokerages / demat
      { name: 'HDFC Securities',            q: 'from:hdfcsec.com' },                              // edocs@hdfcsec.com
      { name: 'Zerodha',                    q: 'from:reportsmailer.zerodha.net' },
      { name: 'ICICI Securities',           q: 'from:icicidirect.com' },
      { name: 'Kotak Securities',           q: 'from:kotaksecurities.com' },
      { name: 'Groww',                      q: 'from:groww.in subject:(statement OR portfolio OR holdings)' },
      { name: 'Angel One',                  q: 'from:angelbroking.com OR from:angelone.in' },
      { name: 'Upstox',                     q: 'from:upstox.com' },
      { name: 'Sharekhan',                  q: 'from:sharekhan.com subject:(statement OR account)' },
      // MF transfer agents — one query catches ALL AMFs they service
      { name: 'NSDL CAS',                   q: 'from:NSDL-CAS@nsdl.co.in' },
      { name: 'CAMS (all AMFs)',            q: 'from:camsonline.com has:attachment' },             // sends for ABSLMF, HDFC MF, SBI MF, etc.
      { name: 'KFintech (all AMFs)',        q: 'from:kfintech.com has:attachment' },               // sends for Nippon, Mirae, UTI, etc.
      { name: 'CDSL CAS',                   q: 'from:cdsl.com OR from:cdslindia.com subject:(CAS OR statement)' },
      // ── Tier 2: Subject-based — catches any sender not above ──
      { name: 'Account / bank statements',  q: 'subject:("account statement" OR "bank statement") has:attachment' },
      { name: 'E-statements',               q: 'subject:("e-statement" OR "eStatement" OR "online statement") has:attachment' },
      { name: 'Demat & holdings',           q: 'subject:(demat OR "DP statement" OR "holding statement" OR "depository statement") has:attachment' },
      { name: 'Portfolio & valuation',      q: 'subject:("portfolio statement" OR "portfolio valuation" OR "investment report") has:attachment' },
      { name: 'Consolidated (CAS)',         q: 'subject:("consolidated account statement" OR "CAS") has:attachment' },
      { name: 'Mutual fund statements',     q: 'subject:("mutual fund statement" OR "MF statement" OR "folio statement") has:attachment' },
      { name: 'Capital gains & P&L',        q: 'subject:("capital gains" OR "P&L" OR "profit and loss" OR "tax P&L") has:attachment' },
      { name: 'Annual statements',          q: 'subject:("annual statement" OR "yearly statement" OR "year end") has:attachment' },
      { name: 'Periodic statements',        q: 'subject:("monthly statement" OR "quarterly statement") has:attachment' },
      // ── Tier 3: Filename-based — catches statements where subject gives no signal ──
      { name: 'PDF: statement filename',    q: 'filename:statement has:attachment' },
      { name: 'PDF: holdings filename',     q: 'filename:(holdings OR portfolio OR AccountStatement OR ledger) has:attachment' },
      // ── Tier 4: Broad fallback — last resort ──
      { name: 'All statements (broad)',     q: 'subject:statement has:attachment -subject:(credit card OR insurance OR recharge OR "bill payment" OR EMI OR invoice OR loan)' },
    ];

    function buildGmailQueries(_priorAccounts, taxYear) {
      // Full year + 4-month buffer — year-end statements often arrive in Jan–Apr
      const dateRange = `after:${taxYear}/01/01 before:${taxYear + 1}/05/01`;
      return STATEMENT_SCAN_QUERIES.map(q => ({
        name: q.name,
        q: `${q.q} ${dateRange}`,
        kind: 'scan',
      }));
    }

    class GmailTokenExpiredError extends Error {
      constructor() { super('Gmail token expired — please reconnect on the Setup screen'); this.name = 'GmailTokenExpiredError'; }
    }

    function gmailCheckStatus(r, label) {
      if (r.status === 401) throw new GmailTokenExpiredError();
      if (!r.ok) throw new Error(`${label} ${r.status}`);
    }

    async function gmailSearch(token, query, maxResults = 10) {
      const url = `https://gmail.googleapis.com/gmail/v1/users/me/messages` +
        `?q=${encodeURIComponent(query)}&maxResults=${maxResults}`;
      const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      gmailCheckStatus(r, 'Gmail search');
      const d = await r.json();
      return d.messages || [];
    }

    async function gmailGetMessage(token, msgId) {
      const r = await fetch(
        `https://gmail.googleapis.com/gmail/v1/users/me/messages/${msgId}?format=full`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      gmailCheckStatus(r, 'Gmail message');
      return r.json();
    }

    async function gmailGetAttachment(token, msgId, attId) {
      const r = await fetch(
        `https://gmail.googleapis.com/gmail/v1/users/me/messages/${msgId}/attachments/${attId}`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      gmailCheckStatus(r, 'Gmail attachment');
      const d = await r.json();
      return d.data; // base64url
    }

    const STATEMENT_MIME_TYPES = new Set([
      'application/pdf',
      'application/vnd.ms-excel',
      'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      'text/csv'
    ]);

    function extractAttachments(payload) {
      const parts = [];
      function walk(p) {
        if (!p) return;
        if (p.parts) p.parts.forEach(walk);
        if (p.body?.attachmentId && STATEMENT_MIME_TYPES.has(p.mimeType)) {
          parts.push({ attId: p.body.attachmentId, mimeType: p.mimeType, filename: p.filename || 'attachment' });
        }
      }
      walk(payload);
      return parts;
    }

    function gmailHeader(payload, name) {
      return payload?.headers?.find(h => h.name.toLowerCase() === name.toLowerCase())?.value || '';
    }

    // ─── Local cache helpers ──────────────────────────────────────────────────
    // IndexedDB: persists FileSystemDirectoryHandle across page loads
    async function openCacheDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('tax-agent-cache', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('meta');
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }
    async function idbGet(db, key) {
      return new Promise(resolve => {
        const req = db.transaction('meta', 'readonly').objectStore('meta').get(key);
        req.onsuccess = () => resolve(req.result ?? null);
        req.onerror = () => resolve(null);
      });
    }
    async function idbPut(db, key, value) {
      return new Promise(resolve => {
        const req = db.transaction('meta', 'readwrite').objectStore('meta').put(value, key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
      });
    }

    // Verify (and re-request if needed) readwrite permission on a stored dir handle
    async function verifyDirHandle(handle) {
      if (!handle) return null;
      try {
        const p = await handle.queryPermission({ mode: 'readwrite' });
        if (p === 'granted') return handle;
        const r = await handle.requestPermission({ mode: 'readwrite' });
        return r === 'granted' ? handle : null;
      } catch { return null; }
    }

    // Write a base64url-encoded attachment to the cache folder
    async function saveToCacheDir(dirHandle, filename, b64url) {
      try {
        const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
        const bin = atob(b64);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        const fh = await dirHandle.getFileHandle(filename, { create: true });
        const w = await fh.createWritable();
        await w.write(buf);
        await w.close();
        return true;
      } catch(e) { console.warn('[tax-agent] cache write failed:', filename, e.message); return false; }
    }

    // Check whether a file already exists in the cache folder
    async function existsInCacheDir(dirHandle, filename) {
      try { await dirHandle.getFileHandle(filename); return true; } catch { return false; }
    }

    // Per-year message cache in localStorage — keyed by msgId
    // Structure: { [msgId]: { subject, from, atts: [{filename, parsedAccounts}] } }
    function loadMsgCache(taxYear) {
      try { return JSON.parse(localStorage.getItem(`tax-agent-msgcache-${taxYear}`) || '{}'); } catch { return {}; }
    }
    function saveMsgCacheEntry(taxYear, msgId, entry, existingCache) {
      try {
        const cache = existingCache || loadMsgCache(taxYear);
        cache[msgId] = entry;
        localStorage.setItem(`tax-agent-msgcache-${taxYear}`, JSON.stringify(cache));
        return cache;
      } catch { return existingCache || {}; }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Extract accounts directly from FinCEN XFA PDF (no AI needed)
    async function extractXFAAccounts(file) {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);

      // Decompress a Uint8Array using the browser Streams API
      async function tryDecompress(chunk) {
        // Build list of (format, data) attempts:
        // 1. 'deflate' (zlib-wrapped) — standard PDF FlateDecode
        // 2. 'deflate-raw' — raw deflate without zlib header
        // 3. If chunk starts with zlib magic byte 0x78, strip the 2-byte zlib header and try deflate-raw
        const attempts = [
          ['deflate', chunk],
          ['deflate-raw', chunk],
        ];
        if (chunk.length > 2 && chunk[0] === 0x78) {
          attempts.push(['deflate-raw', chunk.slice(2)]);
        }

        const errors = [];
        for (const [fmt, data] of attempts) {
          try {
            const inputStream = new ReadableStream({
              start(c) { c.enqueue(data); c.close(); }
            });
            const reader = inputStream.pipeThrough(new DecompressionStream(fmt)).getReader();
            const parts = [];
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              parts.push(value);
            }
            const out = new Uint8Array(parts.reduce((a, b) => a + b.length, 0));
            let off = 0; parts.forEach(p => { out.set(p, off); off += p.length; });
            return new TextDecoder('utf-8', { fatal: false }).decode(out);
          } catch(e) {
            errors.push(`${fmt}(${data === chunk ? 'raw' : 'strip2'}): ${e.message}`);
          }
        }
        // errors suppressed — non-deflate streams (images, fonts) are expected
        return null;
      }

      // Scan for stream...endstream blocks
      function matchAt(arr, pos, marker) {
        if (pos + marker.length > arr.length) return false;
        for (let k = 0; k < marker.length; k++) if (arr[pos+k] !== marker[k]) return false;
        return true;
      }
      // 'stream\n'   = [115,116,114,101,97,109,10]
      // 'stream\r\n' = [115,116,114,101,97,109,13,10]
      // 'endstream'  = [101,110,100,115,116,114,101,97,109]
      const SM1 = [115,116,114,101,97,109,10];
      const SM2 = [115,116,114,101,97,109,13,10];
      const EM  = [101,110,100,115,116,114,101,97,109];

      const chunks = [];
      for (let i = 0; i < bytes.length - 10; i++) {
        if (bytes[i] !== 115) continue; // fast pre-filter: 's'
        let skip = 0;
        if (matchAt(bytes, i, SM1)) skip = SM1.length;
        else if (matchAt(bytes, i, SM2)) skip = SM2.length;
        if (skip === 0) continue;
        const start = i + skip;
        let end = -1;
        for (let j = start; j < bytes.length - 9; j++) {
          if (bytes[j] === 101 && matchAt(bytes, j, EM)) { end = j; break; }
        }
        // Strip the mandatory \r\n or \n that the PDF spec requires before 'endstream'
        // — that byte is NOT part of the compressed data and causes "junk after end" errors.
        if (end > start) {
          let dataEnd = end;
          if (dataEnd > start && bytes[dataEnd - 1] === 10) dataEnd--;  // \n
          if (dataEnd > start && bytes[dataEnd - 1] === 13) dataEnd--;  // \r
          chunks.push(bytes.slice(start, dataEnd));
          i = end + EM.length - 1;
        }
      }

      // Try to extract accounts from a decompressed XML text.
      // Returns array of accounts (possibly empty if this is the schema stream).
      // FinCEN 114 AccountType codes (from BSA filing instructions):
      // A = Bank/deposit account, B = Securities/brokerage account,
      // S = Securities (alt), M = Mutual fund, Z = Other, C = Other
      const TYPE_MAP = { A: 'bank', B: 'brokerage', S: 'brokerage', M: 'mf', Z: 'other', C: 'other' };
      const ns = 'http://www.fincen.gov/bsa/ffbar/2011-06-01';

      function xget(el, localName) {
        const byNS = el.getElementsByTagNameNS(ns, localName);
        if (byNS.length) return byNS[0].textContent?.trim() || '';
        const byPfx = el.getElementsByTagName('ffbar:' + localName);
        if (byPfx.length) return byPfx[0].textContent?.trim() || '';
        const byBare = el.getElementsByTagName(localName);
        if (byBare.length) return byBare[0].textContent?.trim() || '';
        return '';
      }

      function tryExtractFromText(text) {
        // Every tag in this PDF has a newline before >, e.g. <ffbar:FinInstName\n>value</ffbar:FinInstName\n>
        // Strip ALL \n> → > so DOMParser sees valid XML.
        const normalized = text.replace(/\n>/g, '>');
        const doc = new DOMParser().parseFromString(normalized, 'text/xml');
        const accounts = [];
        for (const tag of ['FinAcctOwnedSeparately', 'FinAcctOwnedJointly', 'FinAcctSigAuth']) {
          const ownership = tag === 'FinAcctOwnedSeparately' ? 'sole'
                          : tag === 'FinAcctOwnedJointly'    ? 'joint' : 'sigauth';
          const els = doc.getElementsByTagNameNS(ns, tag).length
            ? doc.getElementsByTagNameNS(ns, tag)
            : doc.getElementsByTagName('ffbar:' + tag);
          for (const el of els) {
            const name = xget(el, 'FinInstName');
            if (!name) continue;
            const num    = xget(el, 'AccntNumber');
            const typ    = xget(el, 'AccountType');
            const maxv   = parseFloat(xget(el, 'MaximumAccntValue') || '0');
            const digits = num.replace(/\D/g, '');
            const last4  = digits.length >= 4 ? digits.slice(-4) : (digits || num.slice(-4));
            let joint_owner = null;
            if (ownership === 'joint') {
              const nOwners = xget(el, 'NOofJointOwners');
              const joEls = el.getElementsByTagNameNS(ns, 'PrincipalJointOwner').length
                ? el.getElementsByTagNameNS(ns, 'PrincipalJointOwner')
                : el.getElementsByTagName('ffbar:PrincipalJointOwner');
              let ownerName = '';
              if (joEls.length) {
                const jo = joEls[0];
                ownerName = [xget(jo, 'FirstName'), xget(jo, 'LastName')].filter(Boolean).join(' ');
              }
              joint_owner = ownerName || (nOwners ? `${nOwners} joint owner(s), name not on file` : null);
            }
            accounts.push({
              institution_name: name,
              account_number: last4 ? `****${last4}` : num || '????',
              account_type: TYPE_MAP[typ] || 'other',
              ownership, joint_owner,
              max_value_usd: maxv, year_end_value_usd: maxv, currency: 'INR',
            });
          }
        }
        return accounts;
      }

      // Scan all streams — try to parse every one that mentions the BSA form.
      // Return accounts from the first stream that yields non-empty results.
      // This avoids fragile schema-vs-data heuristics.
      console.log(`[tax-agent] XFA: scanning ${chunks.length} streams`);
      for (let si = 0; si < chunks.length; si++) {
        const chunk = chunks[si];
        const text = await tryDecompress(chunk);
        if (!text) continue; // non-deflate stream (image/font/etc.) — ignore silently
        if (!text.includes('ffbar:BSAForm')) continue;
        const accounts = tryExtractFromText(text);
        console.log(`[tax-agent] XFA: stream ${si} length ${text.length} → ${accounts.length} accounts`);
        if (accounts.length > 0) return accounts;
      }
      console.log('[tax-agent] XFA: no accounts found in any stream');
      return null; // null = not an XFA FBAR, fall through to Gemini
    }

    async function parsePriorFBAR(file, apiKey) {
      // Try direct XFA extraction first (works on FinCEN BSA PDFs without AI)
      try {
        const xfaAccounts = await extractXFAAccounts(file);
        if (xfaAccounts && xfaAccounts.length > 0) return xfaAccounts;
      } catch(e) { console.warn('XFA extraction failed:', e); }

      // Fall back to Gemini for non-XFA PDFs
      const result = await callGemini(apiKey,
        `This is a FinCEN 114 (FBAR) form for a US person with foreign financial accounts.
Extract every foreign financial account listed. Return JSON:
{"accounts":[{"institution_name":"string","account_number":"****XXXX (last 4 only)","account_type":"bank|brokerage|mf|other","account_holder":"string","max_value_usd":number,"year_end_value_usd":number,"currency":"string","tax_year":number}]}
Only JSON, no explanation.`, file);
      console.log('[tax-agent] parsePriorFBAR Gemini result:', result);
      if (Array.isArray(result)) return result;
      if (Array.isArray(result.accounts)) return result.accounts;
      const firstArray = Object.values(result).find(v => Array.isArray(v));
      if (firstArray) return firstArray;
      return [];
    }

    // Platform/aggregator names that are not actual account-holding institutions
    const PLATFORM_BLOCKLIST = new Set([
      'wealth-spectrum','wealthspectrum','mfcentral','mf central','cams','kfintech','karvy',
      'nsdl','cdsl','bse starmf','mfutility','prudent','nj wealth','njwealth',
      'consolidated','cas','statement'
    ]);

    function isSpuriousInstitution(name) {
      const n = (name || '').toLowerCase().replace(/[\s\-_.]/g,'');
      return PLATFORM_BLOCKLIST.has(n) || PLATFORM_BLOCKLIST.has(name.toLowerCase().trim());
    }

    async function parseStatement(file, apiKey) {
      // Returns an array of accounts (CAS statements can contain many)
      const result = await callGemini(apiKey,
        `You are extracting FBAR-reportable financial ACCOUNTS from an Indian financial document.

CRITICAL RULE: You are extracting ACCOUNTS, not HOLDINGS. An account is the container. Holdings are what's inside the container.

WHAT IS AN ACCOUNT (extract these):
- Bank savings/current/FD account → 1 entry, institution = bank name
- Demat account at a depository participant (Zerodha, HDFC Securities, Angel One, ICICI Direct…) → 1 entry, institution = broker name, account_number = last 4 of BO client ID
- Mutual fund folio at an AMC → 1 entry per AMC (e.g. "Aditya Birla Sun Life MF"), account_number = last 4 of folio number
- PMS / advisory portfolio (Itus Capital, Motilal Oswal PMS…) → 1 entry per portfolio account
- AIF (Alternative Investment Fund, e.g. Clarus Capital I, Edelweiss AIF…) → 1 entry, institution = fund name, account_number = last 4 of folio number, account_type = "other"

WHAT IS NOT AN ACCOUNT (never extract these):
- Infosys, Reliance, TCS, HDFC Bank, any company stock → these are HOLDINGS inside a demat account
- Nifty 50 ETF, SBI Bluechip Fund, Axis Midcap → these are SCHEMES inside a folio (aggregate by AMC)
- ISIN numbers, NSE/BSE symbols, scrip codes → holdings, not accounts
- CAMS, KFintech, NSDL, CDSL, MF Central, Wealth-Spectrum, NJ Wealth, Prudent → aggregators/platforms, not account holders

EXAMPLES:
- Zerodha demat holds Infosys, TCS, Wipro → return ONE entry: {"institution_name":"Zerodha","account_type":"brokerage"…}
- ABSLMF folio has Frontline Equity, Liquid Fund, Tax Saver → return ONE entry: {"institution_name":"Aditya Birla Sun Life MF","account_type":"mf"…}
- NSDL CAS showing multiple demat accounts → ONE entry per demat BO account (not per stock)
- Itus Capital report showing ABSLMF and Mirae folios → return the individual AMC folio entries, NOT "Itus Capital"

Return JSON array only (no markdown, no explanation):
[{"institution_name":"canonical name","account_number":"****XXXX","account_type":"bank|brokerage|mf|other","currency":"INR","peak_balance_inr":number,"year_end_balance_inr":number,"statement_year":number,"source_type":"bank|brokerage|cas_demat|cas_mf|portfolio_manager"}]

- account_number: last 4 chars of account/folio/client-ID, prefixed ****
- peak_balance_inr: highest total portfolio value in the period
- year_end_balance_inr: Dec 31 value or latest available
- Return [] if document is not a financial statement`, file);
      let accounts = [];
      if (Array.isArray(result)) accounts = result;
      else if (Array.isArray(result.accounts)) accounts = result.accounts;
      else {
        const firstArray = Object.values(result).find(v => Array.isArray(v));
        if (firstArray) accounts = firstArray;
        else if (result.institution_name) accounts = [result];
      }
      return filterHoldings(accounts);
    }

    // Canonical aliases: maps common variants to a single normalised key
    const INST_ALIASES = {
      'adityabirlasunlifemf': 'adityabirla', 'adityabirlasunlife': 'adityabirla',
      'adityabirlacapital': 'adityabirla', 'abslmf': 'adityabirla', 'abcap': 'adityabirla',
      'hdfcmutualfund': 'hdfcmf', 'hdfcmf': 'hdfcmf', 'hdfcamc': 'hdfcmf',
      'sbimutualfund': 'sbimf', 'sbimf': 'sbimf',
      'nipponindiamutalfund': 'nipponmf', 'nipponindiamf': 'nipponmf', 'reliancemf': 'nipponmf',
      'iciciprumutualfund': 'iciciprudentialmf', 'iciciprudential': 'iciciprudentialmf',
      'kotakmahindra': 'kotak', 'kotaksecurities': 'kotaksec',
      'hdfcsecurities': 'hdfcsec', 'hdfcsec': 'hdfcsec',
      'statebankofindia': 'sbi', 'statebankofind': 'sbi',
      'yesbank': 'yesbank', 'yesbankltd': 'yesbank',
      'citibank': 'citi', 'citibankna': 'citi',
    };
    function normInst(name) {
      const base = (name || '').toLowerCase()
        .replace(/[.\-_,]/g, ' ')
        .replace(/\b(bank|ltd|limited|securities|broking|mutual fund|mf|amc|india|pvt|private|co)\b/g, '')
        .replace(/\s+/g, '');
      return INST_ALIASES[base] || base;
    }

    function normAccountNumber(raw) {
      const clean = (raw || '').replace(/\*/g, '').trim();
      if (!clean) return '****????';
      const last4 = clean.slice(-4);
      return `****${last4}`;
    }

    // Known Indian listed companies / ETFs / scheme keywords that should never appear as institution_name.
    // Gemini sometimes returns individual holdings as accounts despite the prompt — filter them out.
    const HOLDING_KEYWORDS = [
      'infosys','tcs','wipro','reliance','hdfc bank','icici bank','itc','bajaj',
      'bharti airtel','airtel','larsen','l&t','maruti','asian paints','hul','hindustan unilever',
      'kotak mahindra bank','axis bank','ultratech','nestle','sun pharma','titan',
      'nifty','sensex','bse','nse','etf','index fund','direct plan','regular plan',
      'growth','dividend','bluechip','midcap','smallcap','flexicap','flexi cap',
      'liquid fund','overnight fund','debt fund','gilt','banking & psu',
      'isin','in000','nse:','bse:','scrip',
    ];
    function isLikelyHolding(name) {
      const n = (name || '').toLowerCase();
      return HOLDING_KEYWORDS.some(k => n.includes(k));
    }

    function filterHoldings(accounts) {
      return accounts.filter(a => {
        if (!a.institution_name) return false;
        if (isLikelyHolding(a.institution_name)) {
          console.log('[tax-agent] filtered holding:', a.institution_name);
          return false;
        }
        return true;
      });
    }

    function matchAccounts(priorAccounts, scannedList, fxRate) {
      const results = [];
      const usedPrior = new Set();

      for (const scanned of scannedList) {
        const sLast4 = (scanned.account_number || '').replace(/\*/g,'').slice(-4);
        const sNorm = normInst(scanned.institution_name);

        let matchIdx = -1;
        for (let i = 0; i < priorAccounts.length; i++) {
          if (usedPrior.has(i)) continue;
          const p = priorAccounts[i];
          const pLast4 = (p.account_number || '').replace(/\*/g,'').slice(-4);
          const pNorm = normInst(p.institution_name);
          const numMatch = sLast4 && pLast4 && sLast4 === pLast4;
          const nameMatch = sNorm.length >= 4 && pNorm.length >= 4 &&
            (sNorm.startsWith(pNorm.slice(0,4)) || pNorm.startsWith(sNorm.slice(0,4)));
          if (numMatch || nameMatch) { matchIdx = i; break; }
        }

        const newMax = Math.round((scanned.peak_balance_inr || 0) / fxRate);
        const newYE = Math.round((scanned.year_end_balance_inr || 0) / fxRate);
        const id = String(results.length + 1);

        if (matchIdx >= 0) {
          usedPrior.add(matchIdx);
          const p = priorAccounts[matchIdx];
          const typeChanged = p.account_type && scanned.account_type && p.account_type !== scanned.account_type;
          results.push({
            id, name: scanned.institution_name,
            number: normAccountNumber(scanned.account_number || p.account_number),
            type: scanned.account_type || p.account_type || 'other',
            priorType: typeChanged ? p.account_type : undefined,
            currency: 'INR',
            ownership: p.ownership || null,
            joint_owner: p.joint_owner || null,
            priorMax: p.max_value_usd, priorYearEnd: p.year_end_value_usd,
            newMax: newMax || null, newYearEnd: newYE || null,
            status: typeChanged ? 'review' : 'matched',
            reviewReason: typeChanged ? 'type_change' : undefined,
            source: scanned._source || 'local file'
          });
        } else {
          results.push({
            id, name: scanned.institution_name,
            number: normAccountNumber(scanned.account_number),
            type: scanned.account_type || 'other', currency: 'INR',
            ownership: null, joint_owner: null,
            priorMax: null, priorYearEnd: null,
            newMax: newMax || null, newYearEnd: newYE || null,
            status: 'new', source: scanned._source || 'local file'
          });
        }
      }

      // Prior accounts with no match = missing
      priorAccounts.forEach((p, i) => {
        if (usedPrior.has(i)) return;
        results.push({
          id: String(results.length + 1),
          name: p.institution_name, number: p.account_number || '****????',
          type: p.account_type || 'other', currency: p.currency || 'INR',
          ownership: p.ownership || null,
          joint_owner: p.joint_owner || null,
          priorMax: p.max_value_usd, priorYearEnd: p.year_end_value_usd,
          newMax: null, newYearEnd: null, status: 'missing', source: null
        });
      });

      return results;
    }

    function fmtUSD(val) {
      if (val == null) return '—';
      return '$' + Number(val).toLocaleString('en-US', { maximumFractionDigits: 0 });
    }

    function renderText(text) {

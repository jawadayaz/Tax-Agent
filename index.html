    // ─── ScanScreen ───────────────────────────────────────────────────────────
    function ScanScreen({ taxYear, geminiKey, gmailToken, setGmailToken, priorFbarFile, uploadedStatements, priorManualAccounts, setAccounts, setFxRate, onNext, onBack, cacheDir }) {
      const isGmail = geminiKey && gmailToken;
      const isLocal = geminiKey && uploadedStatements.length > 0;
      const isReal = isGmail || isLocal || (geminiKey && (priorFbarFile || priorManualAccounts.length > 0));
      const [items, setItems] = useState([]);
      const [error, setError] = useState(null);
      const [done, setDone] = useState(false);
      const [tokenExpired, setTokenExpired] = useState(false);
      const [newToken, setNewToken] = useState('');
      // Intermediate scan results — held here until user clicks Proceed
      const [scanData, setScanData] = useState(null); // { priorAccounts, scannedList, rate, fbarFailed }
      // Per-item skip state: Set of item IDs skipped in this session
      const [skippedIds, setSkippedIds] = useState(() => new Set());
      // Persisted skips: Set of item labels saved across sessions
      const [savedSkipLabels] = useState(() => new Set(JSON.parse(localStorage.getItem('fbar_skipped_labels') || '[]')));

      function setItemStatus(id, status, note) {
        setItems(prev => prev.map(it => it.id === id ? { ...it, status, note: note || it.note } : it));
      }

      function skipItem(id) {
        setSkippedIds(prev => new Set([...prev, id]));
        // Also save the label persistently
        setItems(prev => {
          const item = prev.find(it => it.id === id);
          if (item) {
            const updated = new Set(savedSkipLabels);
            updated.add(item.label);
            localStorage.setItem('fbar_skipped_labels', JSON.stringify([...updated]));
          }
          return prev;
        });
      }

      function unskipItem(id) {
        setSkippedIds(prev => { const s = new Set(prev); s.delete(id); return s; });
        setItems(prev => {
          const item = prev.find(it => it.id === id);
          if (item) {
            const updated = new Set(savedSkipLabels);
            updated.delete(item.label);
            localStorage.setItem('fbar_skipped_labels', JSON.stringify([...updated]));
          }
          return prev;
        });
      }

      function proceedToReview() {
        if (!scanData) return;
        const { priorAccounts, scannedList, rate, fbarFailed } = scanData;
        // Filter out skipped items and deduplicate across all sources
        const seen = new Set();
        const activeList = scannedList.filter(a => {
          if (skippedIds.has(a._queryId)) return false;
          const key = normInst(a.institution_name) + '|' + (a.account_number || '').replace(/\*/g,'').slice(-4);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
        let finalAccounts;
        if (activeList.length > 0) {
          finalAccounts = matchAccounts(priorAccounts, activeList, rate);
        } else if (priorAccounts.length > 0) {
          finalAccounts = priorAccounts.map((p, i) => ({
            id: String(i + 1), name: p.institution_name,
            number: p.account_number || '****????', type: p.account_type || 'bank',
            currency: p.currency || 'INR', priorMax: p.max_value_usd,
            priorYearEnd: p.year_end_value_usd, newMax: null, newYearEnd: null,
            status: 'missing', source: null
          }));
        } else {
          finalAccounts = [];
        }
        console.log('[tax-agent] finalAccounts:', finalAccounts);
        setAccounts(finalAccounts);
        onNext();
      }

      useEffect(() => {
        let cancelled = false;

        async function fetchFxRate() {
          let rate = 83.97;
          try {
            const r = await fetch(`${WORKER_URL}/api/fx?year=${taxYear}`);
            if (r.ok) { const d = await r.json(); rate = d.rate; }
          } catch(_) {}
          return rate;
        }

        async function parsePriorFbarStep() {
          // PDF takes priority — try XFA extraction (and Gemini fallback) first
          if (priorFbarFile) {
            setItemStatus('fbar', 'active');
            try {
              const accounts = await parsePriorFBAR(priorFbarFile, geminiKey);
              if (accounts.length > 0) {
                setItemStatus('fbar', 'done', `${accounts.length} accounts found`);
                return { accounts, failed: false };
              }
              // PDF parsed but 0 accounts — check console for XFA debug logs
              const hint = !geminiKey ? ' (no Gemini key for fallback)' : ' (check console for XFA debug)';
              setItemStatus('fbar', 'error', `0 accounts extracted from PDF${hint}`);
            } catch(e) {
              console.error('[tax-agent] parsePriorFBAR error:', e);
              setItemStatus('fbar', 'error', e.message || String(e));
            }
          }
          // Fall back to manually entered accounts
          if (priorManualAccounts.length > 0) {
            const accounts = priorManualAccounts.map(a => ({
              institution_name: a.institution_name,
              account_number: a.account_number,
              account_type: a.account_type,
              max_value_usd: parseFloat(a.max_value_usd) || 0,
              year_end_value_usd: parseFloat(a.year_end_value_usd) || 0,
              currency: 'INR',
            }));
            setItemStatus('fbar', 'done', `${accounts.length} accounts from manual entry`);
            return { accounts, failed: false };
          }
          return { accounts: [], failed: false };
        }

        async function runGmailScan(priorAccounts) {
          const queries = buildGmailQueries(priorAccounts, taxYear);
          const kindLabel = { scan: 'email scan', known: 'institution', fbar: 'prior FBAR', broad: 'subject match' };
          const gmailItems = queries.map((q, i) => ({
            id: `gq_${i}`, label: `${q.name}`, note2: kindLabel[q.kind] || '', status: 'pending', q: q.q,
            savedSkip: savedSkipLabels.has(q.name)
          }));
          // Auto-skip items saved from prior sessions
          const autoSkipped = new Set(gmailItems.filter(it => it.savedSkip).map(it => it.id));
          setSkippedIds(autoSkipped);

          // Insert gmail items before 'match'
          setItems(prev => {
            const withoutMatch = prev.filter(it => it.id !== 'match');
            const withStatus = gmailItems.map(it => ({
              ...it, status: it.savedSkip ? 'skip' : 'pending'
            }));
            return [...withoutMatch, ...withStatus, { id:'match', label:'Matching accounts', status:'pending' }];
          });

          // Load per-year message cache (parsed results keyed by msgId)
          let msgCache = loadMsgCache(taxYear);
          // Verify cache folder permission (non-blocking; null if not set or denied)
          const activeCacheDir = cacheDir ? await verifyDirHandle(cacheDir) : null;

          const scannedList = [];
          const seenMsgIds = new Set();  // dedup across queries (same msg can match multiple queries)
          const seenAccounts = new Set();
          // Track per-name totals so multiple queries for same institution merge in UI
          const nameFoundCount = {};

          // Helper: merge a parsed account into scannedList with dedup
          function mergeAccount(parsed, subject, from, queryId) {
            if (!parsed.institution_name) return false;
            const last4 = (parsed.account_number || '').replace(/\*/g,'').slice(-4);
            const normName = normInst(parsed.institution_name);
            const dedupeKey = normName + '|' + last4;
            if (seenAccounts.has(dedupeKey)) {
              const srcRank = { bank: 3, brokerage: 3, cas_mf: 2, cas_demat: 2, portfolio_manager: 1 };
              const existing = scannedList.find(s => normInst(s.institution_name) + '|' + (s.account_number||'').replace(/\*/g,'').slice(-4) === dedupeKey);
              if (existing) {
                const newRank = srcRank[parsed.source_type] || 1;
                const oldRank = srcRank[existing.source_type] || 1;
                if (newRank > oldRank) {
                  Object.assign(existing, { ...parsed, _source: `Gmail: ${subject.slice(0,50)}`, _from: from, _sources: [...(existing._sources||[existing._source]), `Gmail: ${subject.slice(0,50)}`] });
                } else {
                  existing._sources = [...(existing._sources||[existing._source]), `Gmail: ${subject.slice(0,50)}`];
                }
              }
              return false;
            }
            seenAccounts.add(dedupeKey);
            scannedList.push({ ...parsed, _source: `Gmail: ${subject.slice(0,50)}`, _from: from, _sources: [`Gmail: ${subject.slice(0,50)}`], _queryId: queryId });
            return true;
          }

          for (let i = 0; i < gmailItems.length; i++) {
            if (cancelled) return scannedList;
            const item = gmailItems[i];
            if (item.savedSkip) continue;
            // Show active only on first query for this name
            const isFirstForName = !Object.prototype.hasOwnProperty.call(nameFoundCount, item.label);
            if (isFirstForName) {
              nameFoundCount[item.label] = 0;
              setItemStatus(item.id, 'active');
            }
            let found = 0;
            try {
              const messages = await gmailSearch(gmailToken, item.q, 10);
              for (const msg of messages) {
                if (cancelled) return scannedList;
                if (seenMsgIds.has(msg.id)) continue;
                seenMsgIds.add(msg.id);

                // ── Cache hit: use stored parsed results, skip all API calls ──
                if (msgCache[msg.id]) {
                  const cached = msgCache[msg.id];
                  for (const att of (cached.atts || [])) {
                    for (const parsed of (att.parsedAccounts || [])) {
                      if (mergeAccount(parsed, cached.subject, cached.from, item.id)) found++;
                    }
                  }
                  continue;
                }

                // ── Cache miss: fetch from Gmail, parse, then cache ──
                const full = await gmailGetMessage(gmailToken, msg.id);
                const subject = gmailHeader(full.payload, 'Subject');
                const from = gmailHeader(full.payload, 'From');
                const attachments = extractAttachments(full.payload);
                const cacheEntry = { subject, from, atts: [] };

                for (const att of attachments) {
                  try {
                    const b64 = await gmailGetAttachment(gmailToken, msg.id, att.attId);

                    // Save attachment to local cache folder if available
                    if (activeCacheDir) {
                      // Sanitize: date prefix + sender slug + original filename
                      const datePrefix = new Date().toISOString().slice(0,10);
                      const senderSlug = from.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 30);
                      const cacheFilename = `${datePrefix}_${senderSlug}_${att.filename}`.slice(0, 200);
                      // Only write if not already on disk
                      if (!(await existsInCacheDir(activeCacheDir, cacheFilename))) {
                        await saveToCacheDir(activeCacheDir, cacheFilename, b64);
                      }
                    }

                    const parsedArr = await parseStatement({ data: b64, mimeType: att.mimeType, name: att.filename }, geminiKey);
                    cacheEntry.atts.push({ filename: att.filename, parsedAccounts: parsedArr });

                    for (const parsed of parsedArr) {
                      if (mergeAccount(parsed, subject, from, item.id)) found++;
                    }
                  } catch(_) {}
                }

                // Persist cache entry for next scan run
                msgCache = saveMsgCacheEntry(taxYear, msg.id, cacheEntry, msgCache);
              }
              nameFoundCount[item.label] = (nameFoundCount[item.label] || 0) + found;
              // Only update UI status on last query for this name, or if we found something
              const isLastForName = i === gmailItems.length - 1 || gmailItems[i+1].label !== item.label;
              if (isFirstForName || found > 0 || isLastForName) {
                const total = nameFoundCount[item.label];
                setItemStatus(item.id, 'done', total > 0 ? `${total} account${total > 1 ? 's' : ''} found` : 'no accounts');
              }
            } catch(e) {
              if (e instanceof GmailTokenExpiredError) throw e;
              setItemStatus(item.id, 'error', e.message.slice(0, 60));
            }
          }
          return scannedList;
        }

        async function runReal() {
          // Step 0: Validate Gmail token before doing any work
          if (isGmail) {
            const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile',
              { headers: { Authorization: `Bearer ${gmailToken}` } });
            if (r.status === 401) throw new GmailTokenExpiredError();
          }

          // Step 1: FX rate
          setItems([
            ...(priorFbarFile ? [{ id:'fbar', label:`Parsing prior FBAR: ${priorFbarFile.name}`, status:'pending' }] : []),
            { id:'fx', label:'Fetching INR → USD exchange rate', status:'pending' },
            { id:'match', label:'Matching accounts', status:'pending' }
          ]);

          setItemStatus('fx', 'active');
          const rate = await fetchFxRate();
          if (cancelled) return;
          setFxRate(rate);
          setItemStatus('fx', 'done', `₹${rate.toFixed(2)}/$1`);

          // Step 2: Parse prior FBAR
          const { accounts: priorAccounts, failed: fbarFailed } = await parsePriorFbarStep();
          if (cancelled) return;

          // Step 3: Scan sources
          let scannedList = [];

          if (isGmail) {
            scannedList = await runGmailScan(priorAccounts);
          }

          // Also parse any manually dropped files
          if (uploadedStatements.length > 0) {
            uploadedStatements.forEach((f, i) => {
              setItems(prev => {
                const idx = prev.findIndex(it => it.id === 'match');
                const newItem = { id:`stmt_${i}`, label:`Parsing: ${f.name}`, status:'pending', file: f };
                return [...prev.slice(0, idx), newItem, ...prev.slice(idx)];
              });
            });
            for (let i = 0; i < uploadedStatements.length; i++) {
              if (cancelled) return;
              setItemStatus(`stmt_${i}`, 'active');
              try {
                const parsedArr = await parseStatement(uploadedStatements[i], geminiKey);
                const valid = parsedArr.filter(r => r.institution_name);
                valid.forEach(r => scannedList.push(r));
                setItemStatus(`stmt_${i}`, 'done', valid.length > 0 ? valid.map(r => r.institution_name).join(', ') : 'no accounts found');
              } catch(e) {
                setItemStatus(`stmt_${i}`, 'error', e.message.slice(0, 60));
              }
            }
          }

          if (cancelled) return;

          // Remove the match placeholder — matching happens when user clicks Proceed
          setItems(prev => prev.filter(it => it.id !== 'match'));

          // Store intermediate results and let user review before proceeding
          setScanData({ priorAccounts, scannedList, rate, fbarFailed });
          setDone(true);
        }

        async function runDemo() {
          const demoItems = [
            { id:'s1', label:'Searching Gmail — Zerodha', status:'pending' },
            { id:'s2', label:'Searching Gmail — Groww', status:'pending' },
            { id:'s3', label:'Searching Gmail — HDFC', status:'pending' },
            { id:'s4', label:'Searching Gmail — ICICI & NSDL', status:'pending' },
            { id:'s5', label:'Fetching INR → USD exchange rate', status:'pending' },
            { id:'s6', label:'Matching accounts to prior FBAR', status:'pending' },
          ];
          setItems(demoItems);
          const delays = [700, 600, 800, 900, 500, 600];
          for (let i = 0; i < demoItems.length; i++) {
            if (cancelled) return;
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status:'active' } : it));
            await new Promise(r => setTimeout(r, delays[i]));
            if (cancelled) return;
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status:'done' } : it));
          }
          try {
            const r = await fetch(`${WORKER_URL}/api/fx?year=${taxYear}`);
            if (r.ok) { const d = await r.json(); setFxRate(d.rate); }
          } catch(_) {}
          const demoAccounts = DEMO_ACCOUNTS.map(a => ({ ...a }));
          setScanData({ priorAccounts: [], scannedList: demoAccounts.map(a => ({...a, _queryId: 's1'})), rate: 83.97, fbarFailed: false });
          setAccounts(demoAccounts);
          setDone(true);
        }

        if (isReal) runReal().catch(e => {
          if (e instanceof GmailTokenExpiredError) {
            sessionStorage.removeItem('gmail_token');
            setGmailToken(null);
            setTokenExpired(true);
            window.open('https://developers.google.com/oauthplayground/?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fgmail.readonly', '_blank');
          } else {
            setError(e.message);
          }
        });
        else runDemo().catch(e => setError(e.message));

        return () => { cancelled = true; };
      }, []);

      const statusIcon = (s) => {
        if (s === 'done') return '✓';
        if (s === 'error') return '✗';
        if (s === 'active') return <span className="spinner">◌</span>;
        return '·';
      };

      return (
        <div className="scan-main">
          <button className="nav-back" onClick={onBack}>← Setup</button>
          <div className="page-title">
            {isGmail ? 'Scanning Gmail' : isLocal ? 'Parsing files' : 'Demo scan'} — {taxYear}
          </div>
          <div className="page-sub">
            {isGmail
              ? `Searching Jan–Dec ${taxYear} (+ buffer to Feb ${taxYear+1}) for statements from all known institutions…`
              : isLocal
              ? `Parsing ${uploadedStatements.length} file${uploadedStatements.length > 1 ? 's' : ''} with Gemini…`
              : 'No Gmail or files connected — loading demo accounts.'}
          </div>
          {!isReal && (
            <div className="demo-banner" style={{marginBottom:12}}>
              {!geminiKey ? 'Add your Gemini API key and connect Gmail (or upload files) on the Setup screen to process real data.'
                         : 'Connect Gmail or upload statement files on the Setup screen.'}
            </div>
          )}
          {error && !tokenExpired && <div className="demo-banner" style={{marginBottom:12, borderColor:'var(--red-border)', background:'var(--red-bg)', color:'var(--red-text)'}}>Error: {error}</div>}
          {tokenExpired && (
            <div style={{marginBottom:16, padding:'14px 16px', background:'var(--amber-bg)', border:'0.5px solid var(--amber-border)', borderRadius:'var(--radius)'}}>
              <div style={{fontSize:13, fontWeight:500, color:'var(--amber-text)', marginBottom:10}}>Gmail token expired — paste a new one to re-scan</div>
              <div style={{fontSize:12, color:'var(--amber-text)', marginBottom:12, lineHeight:1.7}}>
                The OAuth Playground should have opened. If not: <a href="https://developers.google.com/oauthplayground/?scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fgmail.readonly" target="_blank" rel="noreferrer" style={{color:'var(--blue)', fontWeight:500}}>open it here →</a><br/>
                Click <strong>Authorize APIs</strong> · sign in · <strong>Exchange authorization code for tokens</strong> · copy <strong>Access token</strong>
              </div>
              <div style={{display:'flex', gap:8}}>
                <input type="password" placeholder="ya29.a0…" value={newToken}
                  onChange={e => setNewToken(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && newToken.trim()) { setGmailToken(newToken.trim()); sessionStorage.setItem('gmail_token', newToken.trim()); setTokenExpired(false); setNewToken(''); onBack(); } }}
                  style={{flex:1, padding:'8px 10px', border:'0.5px solid var(--amber-border)', borderRadius:'var(--radius)', fontSize:13}}
                />
                <button className="btn-primary"
                  disabled={!newToken.trim()}
                  onClick={() => { const t = newToken.trim(); setGmailToken(t); sessionStorage.setItem('gmail_token', t); setTokenExpired(false); setNewToken(''); onBack(); }}>
                  Reconnect & Re-scan →
                </button>
              </div>
            </div>
          )}
          <div className="scan-list">
            {items.map(it => {
              const isSkipped = skippedIds.has(it.id);
              const canSkip = done && it.id !== 'fbar' && it.id !== 'fx';
              return (
                <div key={it.id} className={`scan-item${isSkipped ? '' : it.status === 'done' ? ' done' : it.status === 'active' ? ' active' : it.status === 'error' ? ' error' : ''}`}
                  style={isSkipped ? {opacity:0.4, textDecoration:'line-through'} : {}}>
                  <span className="scan-icon">{isSkipped ? '–' : statusIcon(it.status)}</span>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:'flex', alignItems:'center', gap:6}}>
                      <span>{it.label}</span>
                      {it.note2 && <span style={{fontSize:10, color:'var(--text3)', background:'var(--bg2)', border:'0.5px solid var(--border)', borderRadius:20, padding:'1px 6px'}}>{it.note2}</span>}
                      {it.status === 'skip' && <span style={{fontSize:10, color:'var(--text3)'}}>auto-skipped</span>}
                    </div>
                    {!isSkipped && it.note && <div style={{fontSize:11, opacity:0.7, marginTop:2}}>{it.note}</div>}
                  </div>
                  {it.q && (it.status === 'done' || it.status === 'error') && (
                    <a href={`https://mail.google.com/mail/u/0/#search/${encodeURIComponent(it.q)}`}
                      target="_blank" rel="noreferrer"
                      style={{fontSize:11, color:'var(--blue)', flexShrink:0, whiteSpace:'nowrap', textDecoration:'none'}}>
                      view emails →
                    </a>
                  )}
                  {canSkip && (
                    isSkipped
                      ? <button onClick={() => unskipItem(it.id)} style={{fontSize:11, color:'var(--blue)', background:'none', border:'none', cursor:'pointer', flexShrink:0}}>restore</button>
                      : <button onClick={() => skipItem(it.id)} style={{fontSize:11, color:'var(--text3)', background:'none', border:'none', cursor:'pointer', flexShrink:0, padding:'2px 6px'}}>skip ✕</button>
                  )}
                </div>
              );
            })}
          </div>
          {done && scanData && (
            <div style={{marginTop:20, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
              <button className="btn-primary" onClick={proceedToReview}>
                Proceed to review →
              </button>
              {skippedIds.size > 0 && (
                <span style={{fontSize:12, color:'var(--text3)'}}>{skippedIds.size} source{skippedIds.size > 1 ? 's' : ''} skipped · skips saved for future scans</span>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── ReviewScreen ─────────────────────────────────────────────────────────
    function ReviewScreen({ accounts, setAccounts, taxYear, fxRate, onNext, onBack }) {
      const priorYear = taxYear - 1;
      const counts = {
        matched: accounts.filter(a => a.status === 'matched').length,
        review: accounts.filter(a => a.status === 'review').length,
        new: accounts.filter(a => a.status === 'new').length,
        missing: accounts.filter(a => a.status === 'missing').length,
        closed: accounts.filter(a => a.status === 'closed').length,
        confirmed: accounts.filter(a => a.status === 'confirmed').length,
      };

      function updateAccount(id, field, raw) {
        const val = raw === '' ? null : parseFloat(raw.replace(/[^0-9.]/g, ''));
        setAccounts(prev => prev.map(a => a.id === id ? { ...a, [field]: isNaN(val) ? null : val } : a));
      }

      function approveAllMatched() {
        setAccounts(prev => prev.map(a => a.status === 'matched' ? { ...a, status: 'confirmed' } : a));
      }

      function rowClass(a) {
        if (a.status === 'review') return 'row-review';
        if (a.status === 'new') return 'row-new';
        if (a.status === 'missing') return 'row-missing';
        if (a.status === 'closed') return 'row-closed';
        return '';
      }

      function statusPill(s) {
        const map = { matched:'pill-green', review:'pill-amber', new:'pill-blue', missing:'pill-red', closed:'pill-gray', confirmed:'pill-green' };
        const label = s === 'confirmed' ? 'matched' : s;
        return <span className={`pill ${map[s] || 'pill-gray'}`}>{label}</span>;
      }

      function EditCell({ accountId, field, value }) {
        const [local, setLocal] = useState(value != null ? String(Math.round(value)) : '');
        return (
          <input
            className="edit-cell"
            value={local}
            placeholder="—"
            onChange={e => setLocal(e.target.value)}
            onBlur={() => updateAccount(accountId, field, local)}
          />
        );
      }

      return (
        <div className="review-main">
          <button className="nav-back" onClick={onBack}>← Re-scan</button>
          <div className="top-row">
            <div>
              <div className="page-title">Review accounts</div>
              <div className="page-sub">{accounts.length} accounts · edit any cell · only amber, blue, red need action</div>
            </div>
            <div className="stat-row">
              <div className="stat"><div className="stat-val" style={{color:'#3B6D11'}}>{counts.matched + counts.confirmed}</div><div className="stat-label">matched</div></div>
              {counts.review > 0 && <div className="stat"><div className="stat-val" style={{color:'#854F0B'}}>{counts.review}</div><div className="stat-label">review</div></div>}
              {counts.new > 0 && <div className="stat"><div className="stat-val" style={{color:'#185FA5'}}>{counts.new}</div><div className="stat-label">new</div></div>}
              {counts.missing > 0 && <div className="stat"><div className="stat-val" style={{color:'#A32D2D'}}>{counts.missing}</div><div className="stat-label">missing</div></div>}
              {counts.closed > 0 && <div className="stat"><div className="stat-val" style={{color:'var(--text3)'}}>{counts.closed}</div><div className="stat-label">closed</div></div>}
            </div>
          </div>

          <div className="tbl-outer">
            <table>
              <thead>
                <tr>
                  <th rowSpan={2}>Account name</th>
                  <th rowSpan={2}>Number</th>
                  <th rowSpan={2}>Type</th>
                  <th rowSpan={2}>Ownership</th>
                  <th rowSpan={2}>Ccy</th>
                  <th colSpan={2} className="prior">{priorYear} prior</th>
                  <th colSpan={2} className="new-grp">{taxYear} new</th>
                  <th rowSpan={2}>Status</th>
                  <th rowSpan={2}>Source</th>
                </tr>
                <tr>
                  <th className="sub-prior">Max value</th>
                  <th className="sub-prior-r">Year-end</th>
                  <th className="sub-new">Max value</th>
                  <th className="sub-new-r">Year-end</th>
                </tr>
              </thead>
              <tbody>
                {accounts.map(a => (
                  <tr key={a.id} className={rowClass(a)}>
                    <td>{a.name}</td>
                    <td className="mono">{a.number}</td>
                    <td>
                      {a.status === 'review' && a.reviewReason === 'type_change' ? (
                        <div className="type-change">
                          <span className="type-old">{TYPE_LABELS[a.priorType]}</span>
                          <span style={{color:'var(--text3)', fontSize:10}}>→</span>
                          <span>{TYPE_LABELS[a.type]}</span>
                        </div>
                      ) : TYPE_LABELS[a.type] || a.type}
                    </td>
                    <td style={{fontSize:11}}>
                      {a.ownership === 'joint'
                        ? <span title={a.joint_owner || ''} style={{color:'var(--amber-text)'}}>
                            joint{a.joint_owner ? ` · ${a.joint_owner.length > 22 ? a.joint_owner.slice(0,22)+'…' : a.joint_owner}` : ''}
                          </span>
                        : a.ownership === 'sigauth'
                        ? <span style={{color:'var(--text3)'}}>sig auth</span>
                        : a.ownership === 'sole'
                        ? <span style={{color:'var(--text3)'}}>sole</span>
                        : <span style={{color:'var(--text3)'}}>—</span>}
                    </td>
                    <td style={{color:'var(--text3)', fontSize:11}}>{a.currency}</td>
                    <td className="muted pb">{fmtUSD(a.priorMax)}</td>
                    <td className="muted">{fmtUSD(a.priorYearEnd)}</td>
                    <td className="r nb">
                      {a.status === 'matched' || a.status === 'confirmed' ? fmtUSD(a.newMax) :
                        <EditCell key={a.id+'max'} accountId={a.id} field="newMax" value={a.newMax}/>}
                    </td>
                    <td className="r">
                      {a.status === 'matched' || a.status === 'confirmed' ? fmtUSD(a.newYearEnd) :
                        <EditCell key={a.id+'ye'} accountId={a.id} field="newYearEnd" value={a.newYearEnd}/>}
                    </td>
                    <td>{statusPill(a.status)}</td>
                    <td>{a.source ? <span className="chip">{a.source}</span> : <span style={{color:'var(--text3)'}}>—</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="actions">
            <button className="btn-primary" onClick={onNext}>Proceed to confirm →</button>
            <button className="btn-ghost" onClick={approveAllMatched}>Approve all matched</button>
            <button className="btn-ghost" onClick={() => {
              const rows = accounts.map(a => ({
                institution: a.name, account_number: a.number, type: a.type,
                ownership: a.ownership || '', joint_owner: a.joint_owner || '',
                currency: a.currency || 'INR', fxRate,
                prior_max_usd: a.priorMax, prior_year_end_usd: a.priorYearEnd,
                new_max_usd: a.newMax, new_year_end_usd: a.newYearEnd,
                status: a.status, source: a.source || ''
              }));
              const blob = new Blob([JSON.stringify({ taxYear, fxRate, accounts: rows }, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a2 = document.createElement('a');
              a2.href = url; a2.download = `FBAR_${taxYear}_review.json`; a2.click();
              URL.revokeObjectURL(url);
            }}>Download JSON</button>
            <button className="btn-secondary" onClick={onBack} style={{marginLeft:'auto'}}>← Re-scan</button>
            <span className="fx-note">INR → USD · Dec 31 ₹{fxRate.toFixed(2)}/$1</span>
          </div>
        </div>
      );
    }

    // ─── ConfirmScreen ────────────────────────────────────────────────────────
    function ConfirmScreen({ accounts, setAccounts, taxYear, fxRate, onNext, onBack }) {
      const pending = accounts.filter(a => ['review', 'new', 'missing'].includes(a.status));
      const [messages, setMessages] = useState([]);
      const [qIdx, setQIdx] = useState(0);
      const [inputVal, setInputVal] = useState('');
      const [waitingManual, setWaitingManual] = useState(null); // { accountId, field, label }
      const [manualVal, setManualVal] = useState('');
      const [complete, setComplete] = useState(false);
      const scrollRef = useRef();

      function addMsg(msg) {
        setMessages(prev => {
          const next = [...prev, msg];
          return next;
        });
      }

      function scrollBottom() {
        setTimeout(() => {
          if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }, 50);
      }

      function makeQuestion(account) {
        if (account.status === 'review' && account.reviewReason === 'type_change') {
          return {
            id: `q_${account.id}`,
            from: 'agent',
            text: `**${account.name}** — account type changed from ${TYPE_LABELS[account.priorType]} to ${TYPE_LABELS[account.type]} in the ${taxYear} statement. Is this correct?`,
            accountId: account.id,
            actions: [
              { label: `Yes, it's ${TYPE_LABELS[account.type].toLowerCase()} now`, value: 'confirm_type' },
              { label: `Keep as ${TYPE_LABELS[account.priorType]}`, value: 'revert_type' },
            ]
          };
        }
        if (account.status === 'missing') {
          return {
            id: `q_${account.id}`,
            from: 'agent',
            text: `**${account.name}** — no ${taxYear} statement found. Prior year value was ${fmtUSD(account.priorYearEnd)}.`,
            accountId: account.id,
            actions: [
              { label: 'Use prior year values', value: 'use_prior' },
              { label: "I'll enter manually", value: 'manual_entry' },
              { label: 'Account was closed', value: 'closed' },
            ]
          };
        }
        if (account.status === 'new') {
          return {
            id: `q_${account.id}`,
            from: 'agent',
            text: `**${account.name}** is new. Year-end value from statement: ${fmtUSD(account.newYearEnd)}. What was the peak balance during ${taxYear}?`,
            accountId: account.id,
            actions: [
              { label: `Same as year-end (${fmtUSD(account.newYearEnd)})`, value: 'same_as_yearend' },
              { label: "I'll enter it", value: 'manual_max' },
            ]
          };
        }
      }

      function showCompletion() {
        const active = accounts.filter(a => a.status !== 'closed' && a.newMax != null);
        const totalMax = active.reduce((s, a) => s + (a.newMax || 0), 0);
        const flagged = accounts.filter(a => a.notes).length;
        addMsg({
          id: 'complete',
          from: 'agent',
          text: `All ${accounts.length} accounts resolved. Total max value: **${fmtUSD(totalMax)}**\nExchange rate: ₹${fxRate.toFixed(2)}/$1 (Dec 31, ${taxYear})${flagged > 0 ? ` · ${flagged} account${flagged > 1 ? 's' : ''} flagged for review` : ''}.`,
          actions: [
            { label: 'Generate FBAR PDF →', value: 'export', primary: true },
            { label: 'Back to table', value: 'back' },
          ],
          isFinal: true
        });
        setComplete(true);
        scrollBottom();
      }

      useEffect(() => {
        const matched = accounts.filter(a => a.status === 'matched' || a.status === 'confirmed');
        const initMsg = {
          id: 'init',
          from: 'agent',
          text: `${matched.length} accounts matched cleanly — no action needed on those. I have ${pending.length} item${pending.length !== 1 ? 's' : ''} that need your input.`,
          card: accounts.map(a => ({ name: a.name, number: a.number, status: a.status === 'confirmed' ? 'matched' : a.status }))
        };
        addMsg(initMsg);

        if (pending.length === 0) {
          setTimeout(() => showCompletion(), 400);
        } else {
          setTimeout(() => {
            addMsg(makeQuestion(pending[0]));
            scrollBottom();
          }, 500);
        }
      }, []);

      useEffect(scrollBottom, [messages]);

      function processAction(msgId, action, accountId) {
        const account = accounts.find(a => a.id === accountId);
        if (!account) return;

        // Dismiss buttons on this message
        setMessages(prev => prev.map(m => m.id === msgId ? { ...m, actions: null } : m));

        // User message
        addMsg({ id: `u_${Date.now()}`, from: 'user', text: action.label });

        let agentText = '';
        let memoryNote = null;
        let needManual = null;

        if (action.value === 'confirm_type') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, status: 'confirmed' } : a));
          agentText = `Updated to ${TYPE_LABELS[account.type]}.`;
          memoryNote = `${account.name} reclassified ${TYPE_LABELS[account.priorType]} → ${TYPE_LABELS[account.type]} from ${taxYear}.`;
        } else if (action.value === 'revert_type') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, type: a.priorType, status: 'confirmed' } : a));
          agentText = `Kept as ${TYPE_LABELS[account.priorType]}.`;
        } else if (action.value === 'use_prior') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, newMax: a.priorMax, newYearEnd: a.priorYearEnd, status: 'confirmed', notes: 'Prior year values used — statement not yet received.' } : a));
          agentText = `Done — using prior year values for ${account.name}, flagged for review before filing.`;
          memoryNote = `${account.name} statements arrive late — use prior year values until updated.`;
        } else if (action.value === 'closed') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, status: 'closed' } : a));
          agentText = `${account.name} marked as closed for ${taxYear}.`;
        } else if (action.value === 'same_as_yearend') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, newMax: a.newYearEnd, status: 'confirmed' } : a));
          agentText = `Peak balance set to ${fmtUSD(account.newYearEnd)} (same as year-end).`;
        } else if (action.value === 'manual_entry') {
          needManual = { accountId, field: 'yearend', label: `Enter year-end value for ${account.name} ($)` };
          agentText = null;
        } else if (action.value === 'manual_max') {
          needManual = { accountId, field: 'max', label: `Enter peak balance for ${account.name} in ${taxYear} ($)` };
          agentText = null;
        } else if (action.value === 'export') {
          onNext();
          return;
        } else if (action.value === 'back') {
          // go back to review — handled by parent
          onNext('review');
          return;
        }

        if (needManual) {
          setWaitingManual(needManual);
          scrollBottom();
          return;
        }

        const nextIdx = qIdx + 1;
        setQIdx(nextIdx);

        setTimeout(() => {
          const agentMsg = { id: `a_${Date.now()}`, from: 'agent', text: agentText, memoryNote };
          addMsg(agentMsg);

          if (!complete && nextIdx < pending.length) {
            setTimeout(() => {
              addMsg(makeQuestion(pending[nextIdx]));
              scrollBottom();
            }, 400);
          } else if (!complete) {
            setTimeout(() => showCompletion(), 400);
          }
          scrollBottom();
        }, 300);
      }

      function submitManual() {
        if (!waitingManual || !manualVal) return;
        const { accountId, field } = waitingManual;
        const account = accounts.find(a => a.id === accountId);
        const val = parseFloat(manualVal.replace(/[^0-9.]/g, ''));

        let agentText = '';
        if (field === 'max') {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, newMax: val, status: 'confirmed' } : a));
          agentText = `Peak balance for ${account.name} set to ${fmtUSD(val)}.`;
        } else {
          setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, newYearEnd: val, newMax: val, status: 'confirmed' } : a));
          agentText = `${account.name} values set to ${fmtUSD(val)}.`;
        }

        setWaitingManual(null);
        setManualVal('');
        addMsg({ id: `u_${Date.now()}`, from: 'user', text: `$${val.toLocaleString()}` });

        const nextIdx = qIdx + 1;
        setQIdx(nextIdx);

        setTimeout(() => {
          addMsg({ id: `a_${Date.now()}`, from: 'agent', text: agentText });
          if (nextIdx < pending.length) {
            setTimeout(() => {
              addMsg(makeQuestion(pending[nextIdx]));
              scrollBottom();
            }, 400);
          } else {
            setTimeout(() => showCompletion(), 400);
          }
          scrollBottom();
        }, 300);
      }

      function sendFreeText() {
        if (!inputVal.trim()) return;
        addMsg({ id: `u_${Date.now()}`, from: 'user', text: inputVal.trim() });
        setInputVal('');
        scrollBottom();
      }

      return (
        <div className="chat-area">
          <div style={{padding:'8px 16px 0', borderBottom:'0.5px solid var(--border)'}}>
            <button className="nav-back" onClick={onBack}>← Review table</button>
          </div>
          <div className="chat-scroll" ref={scrollRef}>
            {messages.map(msg => (
              <div key={msg.id} className={msg.from === 'agent' ? 'msg-agent' : 'msg-user'}>
                <div className={msg.from === 'agent' ? 'agent-label' : 'user-label'}>
                  {msg.from === 'agent' ? 'Tax agent' : 'You'}
                </div>
                <div className={msg.from === 'agent' ? 'bubble-agent' : 'bubble-user'}>
                  {msg.text && <div>{renderText(msg.text)}</div>}
                  {msg.card && (
                    <div className="summary-card">
                      {(() => {
                        const matched = msg.card.filter(r => r.status === 'matched' || r.status === 'confirmed');
                        const nonMatched = msg.card.filter(r => !['matched','confirmed'].includes(r.status));
                        const pillMap = { matched:'pill-green', review:'pill-amber', new:'pill-blue', missing:'pill-red', closed:'pill-gray' };
                        return (
                          <>
                            {matched.length > 0 && (
                              <div className="summary-row">
                                <span className="s-muted">{matched.map(r => r.name).join(', ')}</span>
                                <span className="pill pill-green">matched ×{matched.length}</span>
                              </div>
                            )}
                            {nonMatched.map(r => (
                              <div key={r.name} className="summary-row">
                                <span className="s-name">{r.name} {r.number}</span>
                                <span className={`pill ${pillMap[r.status] || 'pill-gray'}`}>{r.status}</span>
                              </div>
                            ))}
                          </>
                        );
                      })()}
                    </div>
                  )}
                  {msg.memoryNote && (
                    <div className="memory-note">Remembered: {msg.memoryNote}</div>
                  )}
                  {msg.actions && (
                    <div className="action-row">
                      {msg.actions.map(action => (
                        <button
                          key={action.value}
                          className={`btn-action${action.primary ? ' primary' : ''}`}
                          onClick={() => msg.isFinal ? processAction(msg.id, action, null) : processAction(msg.id, action, msg.accountId)}
                        >
                          {action.label}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}

            {waitingManual && (
              <div className="msg-agent">
                <div className="agent-label">Tax agent</div>
                <div className="bubble-agent">
                  {waitingManual.label}
                  <div className="manual-input-row">
                    <input
                      type="number"
                      placeholder="e.g. 6500"
                      value={manualVal}
                      onChange={e => setManualVal(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && submitManual()}
                      autoFocus
                    />
                    <button className="btn-action primary" onClick={submitManual}>Set</button>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="chat-input-bar">
            <input
              type="text"
              placeholder="Type a correction or question…"
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && sendFreeText()}
            />
            <button className="send-btn" onClick={sendFreeText}>Send</button>
          </div>
        </div>
      );
    }

    // ─── ExportScreen ─────────────────────────────────────────────────────────
    function ExportScreen({ accounts, taxYear, fxRate, credentials, onBack }) {
      const active = accounts.filter(a => a.status !== 'closed');
      const totalMax = active.reduce((s, a) => s + (a.newMax || 0), 0);
      const totalYearEnd = active.reduce((s, a) => s + (a.newYearEnd || 0), 0);
      const flagged = accounts.filter(a => a.notes).length;

      function downloadJSON() {
        const data = {
          fbar: {
            taxYear,
            filedBy: credentials.fullName || 'N/A',
            fxRate,
            fxRateDate: `Dec 31, ${taxYear}`,
            totalMaxValueUSD: totalMax,
            totalYearEndValueUSD: totalYearEnd,
            accounts: active.map(a => ({
              institution: a.name,
              accountNumber: a.number,
              type: a.type,
              currency: a.currency,
              maxValueUSD: a.newMax || 0,
              yearEndValueUSD: a.newYearEnd || 0,
              status: a.status,
              notes: a.notes || null
            }))
          }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `FBAR_${taxYear}_data.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      return (
        <div className="export-main">
          <button className="nav-back" onClick={onBack}>← Confirm</button>
          <div className="page-title">Export FBAR {taxYear}</div>
          <div className="page-sub">Review summary and download your FBAR data for BSA e-filing.</div>

          {flagged > 0 && (
            <div className="warning-banner">
              ⚠ {flagged} account{flagged > 1 ? 's' : ''} flagged — review before filing. These are using prior year values or have notes attached.
            </div>
          )}

          <div className="export-summary">
            <div className="export-row">
              <span className="export-label">Tax year</span>
              <span className="export-val">{taxYear}</span>
            </div>
            <div className="export-row">
              <span className="export-label">Accounts reported</span>
              <span className="export-val">{active.length}</span>
            </div>
            <div className="export-row">
              <span className="export-label">Total maximum value</span>
              <span className="export-val">{fmtUSD(totalMax)}</span>
            </div>
            <div className="export-row">
              <span className="export-label">Total year-end value</span>
              <span className="export-val">{fmtUSD(totalYearEnd)}</span>
            </div>
            <div className="export-row">
              <span className="export-label">Exchange rate</span>
              <span className="export-val">₹{fxRate.toFixed(2)} / $1 (Dec 31, {taxYear})</span>
            </div>
            {credentials.fullName && (
              <div className="export-row">
                <span className="export-label">Account holder</span>
                <span className="export-val">{credentials.fullName}</span>
              </div>
            )}
          </div>

          <div className="actions" style={{marginBottom: 24}}>
            <button className="btn-primary" onClick={downloadJSON}>
              Download FBAR data (JSON)
            </button>
            <span style={{fontSize:12, color:'var(--text3)'}}>PDF export coming soon</span>
          </div>

          <div className="section-label" style={{marginBottom:10}}>BSA e-filing steps</div>
          <ul className="filing-steps">
            <li>Go to bsaefiling.fincen.treas.gov</li>
            <li>Log in with your FinCEN account (create one if needed)</li>
            <li>Select "File an FBAR" → FinCEN 114</li>
            <li>Enter each account from the data above</li>
            <li>Sign and submit before April 15 (auto-extended to Oct 15)</li>
          </ul>

          <div className="version-footer">{APP_VERSION}</div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [step, setStep] = useState('setup');
      const [taxYear, setTaxYear] = useState(new Date().getFullYear() - 1);
      const [credentials, setCredentials] = useState({ pan: '', dob: '', fullName: '' });
      const [scanSources, setScanSources] = useState({ gmail: false, drive: false, local: false });
      const [localFolder, setLocalFolder] = useState('~/Documents/tax-agent/inbox');
      const [cacheDir, setCacheDir] = useState(null);        // FileSystemDirectoryHandle
      const [cacheDirName, setCacheDirName] = useState('');  // display name
      const cacheDirDB = useRef(null);                       // IDB instance
      const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem('gemini_key') || '');
      const [googleClientId, setGoogleClientId] = useState(() => localStorage.getItem('google_client_id') || '');
      const [gmailToken, setGmailToken] = useState(() => sessionStorage.getItem('gmail_token') || null);
      const [priorFbarFile, setPriorFbarFile] = useState(null);
      const [uploadedStatements, setUploadedStatements] = useState([]);
      const [priorManualAccounts, setPriorManualAccounts] = useState(() => {
        try { return JSON.parse(localStorage.getItem('fbar_prior_manual') || '[]'); } catch(_) { return []; }
      });
      const [accounts, setAccounts] = useState([]);
      const [fxRate, setFxRate] = useState(83.97);

      // Helpers: File ↔ sessionStorage (base64)
      async function fileToSession(file) {
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = e => res({ name: file.name, type: file.type, data: e.target.result.split(',')[1] });
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }
      function sessionToFile({ name, type, data }) {
        const bytes = Uint8Array.from(atob(data), c => c.charCodeAt(0));
        return new File([bytes], name, { type });
      }

      // Restore files and cache folder on mount
      useEffect(() => {
        const saved = localStorage.getItem('fbar_creds');
        if (saved) { try { setCredentials(JSON.parse(saved)); } catch(_) {} }
        try {
          const f = sessionStorage.getItem('prior_fbar_file');
          if (f) setPriorFbarFile(sessionToFile(JSON.parse(f)));
        } catch(_) {}
        try {
          const s = sessionStorage.getItem('uploaded_statements');
          if (s) setUploadedStatements(JSON.parse(s).map(sessionToFile));
        } catch(_) {}

        // Restore saved cache directory handle from IndexedDB
        openCacheDB().then(async db => {
          cacheDirDB.current = db;
          const handle = await idbGet(db, 'cacheDir');
          if (handle) {
            setCacheDir(handle);
            setCacheDirName(handle.name);
          }
        }).catch(() => {});
      }, []);
      useEffect(() => {
        if (credentials.pan || credentials.fullName) {
          localStorage.setItem('fbar_creds', JSON.stringify(credentials));
        }
      }, [credentials]);
      useEffect(() => {
        localStorage.setItem('fbar_prior_manual', JSON.stringify(priorManualAccounts));
      }, [priorManualAccounts]);
      useEffect(() => {
        if (gmailToken) sessionStorage.setItem('gmail_token', gmailToken);
        else sessionStorage.removeItem('gmail_token');
      }, [gmailToken]);
      useEffect(() => {
        if (priorFbarFile) {
          fileToSession(priorFbarFile).then(d => sessionStorage.setItem('prior_fbar_file', JSON.stringify(d))).catch(() => {});
        } else {
          sessionStorage.removeItem('prior_fbar_file');
        }
      }, [priorFbarFile]);
      useEffect(() => {
        if (uploadedStatements.length > 0) {
          Promise.all(uploadedStatements.map(fileToSession))
            .then(arr => sessionStorage.setItem('uploaded_statements', JSON.stringify(arr)))
            .catch(() => {});
        } else {
          sessionStorage.removeItem('uploaded_statements');
        }
      }, [uploadedStatements]);

      async function pickCacheFolder() {
        if (!window.showDirectoryPicker) {
          alert('Your browser does not support the File System Access API.\nUse Chrome or Edge to enable local caching.');
          return;
        }
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
          setCacheDir(handle);
          setCacheDirName(handle.name);
          if (cacheDirDB.current) await idbPut(cacheDirDB.current, 'cacheDir', handle);
        } catch(e) {
          if (e.name !== 'AbortError') console.warn('pickCacheFolder:', e.message);
        }
      }

      function navigate(target) {
        if (typeof target === 'string' && STEPS.includes(target)) { setStep(target); return; }
        const cur = STEPS.indexOf(step);
        const next = STEPS[cur + 1];
        if (next) setStep(next);
      }

      function goBack() {
        const cur = STEPS.indexOf(step);
        // scan goes back to setup; all others go to prior step
        if (cur > 0) setStep(STEPS[cur - 1]);
      }

      const initials = credentials.fullName
        ? credentials.fullName.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase()
        : 'JA';

      // Acquire (or silently refresh) a Gmail access token via GIS
      const gmailRefreshTimer = useRef(null);

      function acquireGmailToken(interactive = false) {
        if (!googleClientId || !window.google?.accounts?.oauth2) return;
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: googleClientId,
          scope: 'https://www.googleapis.com/auth/gmail.readonly',
          callback: (resp) => {
            if (resp.error) {
              if (interactive) alert('OAuth error: ' + resp.error);
              return;
            }
            setGmailToken(resp.access_token);
            // Schedule silent refresh at 55 minutes (token lasts 1 hour)
            if (gmailRefreshTimer.current) clearTimeout(gmailRefreshTimer.current);
            gmailRefreshTimer.current = setTimeout(() => acquireGmailToken(false), 55 * 60 * 1000);
          }
        });
        // prompt:'' = silent if already consented, shows popup only if interactive=true
        client.requestAccessToken({ prompt: interactive ? 'consent' : '' });
      }

      function connectGmail() {
        if (!googleClientId) return;
        if (!window.google?.accounts?.oauth2) {
          alert('Google Identity Services still loading. Try again in a moment.');
          return;
        }
        acquireGmailToken(true);
      }

      // On load: if Client ID is saved, silently try to restore the token
      // (works if user is logged into Google and previously granted access)
      useEffect(() => {
        if (!googleClientId) return;
        // Wait for GIS to load
        const tryAuto = () => {
          if (window.google?.accounts?.oauth2) {
            acquireGmailToken(false);
          } else {
            setTimeout(tryAuto, 500);
          }
        };
        setTimeout(tryAuto, 500);
        return () => { if (gmailRefreshTimer.current) clearTimeout(gmailRefreshTimer.current); };
      }, [googleClientId]);

      const screenProps = { taxYear, fxRate, credentials, accounts, setAccounts, onNext: navigate, onBack: goBack };

      return (
        <div className="shell">
          {window.location.protocol === 'file:' && (
            <div style={{background:'#7c2d12', color:'#fef3c7', padding:'10px 20px', fontSize:13, display:'flex', alignItems:'center', gap:10}}>
              <strong>⚠ Wrong origin:</strong> Open via <code style={{background:'rgba(0,0,0,0.3)', padding:'1px 6px', borderRadius:4}}>http://localhost:8080</code> — run <code style={{background:'rgba(0,0,0,0.3)', padding:'1px 6px', borderRadius:4}}>cd ~/Claude/projects/tax-agent && python3 -m http.server 8080</code> then reload.
            </div>
          )}
          <TopBar step={step} taxYear={taxYear} setTaxYear={setTaxYear} initials={initials} setStep={setStep}/>
          {step === 'setup' && (
            <SetupScreen
              credentials={credentials} setCredentials={setCredentials}
              scanSources={scanSources} setScanSources={setScanSources}
              localFolder={localFolder} setLocalFolder={setLocalFolder}
              geminiKey={geminiKey} setGeminiKey={setGeminiKey}
              googleClientId={googleClientId} setGoogleClientId={setGoogleClientId}
              gmailToken={gmailToken} setGmailToken={setGmailToken} connectGmail={connectGmail}
              priorFbarFile={priorFbarFile} setPriorFbarFile={setPriorFbarFile}
              uploadedStatements={uploadedStatements} setUploadedStatements={setUploadedStatements}
              priorManualAccounts={priorManualAccounts} setPriorManualAccounts={setPriorManualAccounts}
              taxYear={taxYear} onNext={navigate}
              cacheDir={cacheDir} cacheDirName={cacheDirName} pickCacheFolder={pickCacheFolder}
            />
          )}
          {step === 'scan' && (
            <ScanScreen
              taxYear={taxYear} geminiKey={geminiKey}
              gmailToken={gmailToken} setGmailToken={setGmailToken}
              priorFbarFile={priorFbarFile} uploadedStatements={uploadedStatements}
              priorManualAccounts={priorManualAccounts}
              setAccounts={setAccounts} setFxRate={setFxRate}
              onNext={navigate} onBack={goBack}
              cacheDir={cacheDir}
            />
          )}
          {step === 'review' && <ReviewScreen {...screenProps}/>}
          {step === 'confirm' && <ConfirmScreen {...screenProps}/>}
          {step === 'export' && <ExportScreen {...screenProps}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
